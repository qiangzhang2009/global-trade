<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeRoot · 全球贸易导航</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%230b0f19' stroke='%2314b8a6' stroke-width='2'/%3E%3Cpath d='M10 16 L16 10 L22 16 L16 22Z' fill='none' stroke='%2314b8a6' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%2314b8a6'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS RESET & ROOT ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #0b0f19;
      --bg-secondary: #111827;
      --bg-tertiary: #1a2235;
      --bg-card: #141c2e;
      --bg-input: #0f1623;
      --border-subtle: #1e2d45;
      --border-default: #243450;
      --border-strong: #2e4060;
      --text-primary: #f0ede8;
      --text-secondary: #9ca3b4;
      --text-tertiary: #5c6478;
      --accent-official: #3b82f6;
      --accent-official-light: #60a5fa;
      --accent-b2b: #10b981;
      --accent-b2b-light: #34d399;
      --accent-distribution: #f59e0b;
      --accent-distribution-light: #fbbf24;
      --accent-crossborder: #8b5cf6;
      --accent-crossborder-light: #a78bfa;
      --accent-teal: #14b8a6;
      --accent-teal-light: #2dd4bf;
      --shadow-card: 0 2px 12px rgba(0,0,0,0.4);
      --shadow-panel: -4px 0 24px rgba(0,0,0,0.5);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --sidebar-width: 280px;
      --header-height: 64px;
      --ease-out: cubic-bezier(0, 0, 0.2, 1);
      --ease-in: cubic-bezier(0.4, 0, 1, 1);
    }
    [data-theme="light"] {
      --bg-primary: #faf8f5;
      --bg-secondary: #f2ede6;
      --bg-tertiary: #e8e2d8;
      --bg-card: #ffffff;
      --bg-input: #f5f0e8;
      --border-subtle: #d4ccc0;
      --border-default: #c8bfb0;
      --border-strong: #b0a898;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6560;
      --text-tertiary: #9c9590;
      --shadow-card: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-panel: -4px 0 24px rgba(0,0,0,0.1);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.3s ease, color 0.3s ease;
    }
    ::selection { background: var(--accent-teal); color: #0b0f19; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    a { color: inherit; text-decoration: none; }
    input { font-family: inherit; }

    /* ===== LAYOUT ===== */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .header {
      height: var(--header-height);
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-logo svg { width: 32px; height: 32px; }
    .header-logo-text {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    .header-logo-sub {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 300;
      letter-spacing: 0.5px;
      margin-top: -2px;
    }
    .header-search {
      flex: 1;
      max-width: 600px;
      position: relative;
    }
    .header-search input {
      width: 100%;
      height: 40px;
      background: var(--bg-input);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 0 16px 0 40px;
      font-size: 14px;
      color: var(--text-primary);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      outline: none;
    }
    .header-search input::placeholder { color: var(--text-tertiary); }
    .header-search input:focus {
      border-color: var(--accent-teal);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15);
    }
    .header-search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: all 0.15s ease;
    }
    .btn-icon:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    .btn-icon.active {
      background: var(--accent-teal);
      color: #0b0f19;
    }
    .lang-toggle {
      height: 32px;
      padding: 0 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      border: 1px solid var(--border-default);
      transition: all 0.15s ease;
    }
    .lang-toggle:hover {
      border-color: var(--accent-teal);
      color: var(--accent-teal);
    }
    .btn-sidebar-toggle {
      display: none;
    }
    .main-wrapper {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-subtle);
      overflow-y: auto;
      flex-shrink: 0;
      transition: width 0.25s var(--ease-out), opacity 0.2s ease;
    }
    .sidebar.collapsed {
      width: 0;
      opacity: 0;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 16px 16px 8px;
      position: sticky;
      top: 0;
      background: var(--bg-secondary);
      z-index: 10;
      border-bottom: 1px solid var(--border-subtle);
    }
    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }
    .sidebar-stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .stat-pill {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      padding: 3px 8px;
      border-radius: var(--radius-xs);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
    }
    .sidebar-tree {
      padding: 8px 0 24px;
    }
    .tree-continent {
      margin-bottom: 2px;
    }
    .tree-continent-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.1s ease;
      position: relative;
    }
    .tree-continent-header:hover { background: var(--bg-tertiary); }
    .tree-continent-header.active { background: var(--bg-tertiary); }
    .tree-continent-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .tree-continent-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .tree-continent-count {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-tertiary);
      background: var(--bg-primary);
      padding: 1px 6px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border-subtle);
    }
    .tree-chevron {
      color: var(--text-tertiary);
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }
    .tree-continent-header.open .tree-chevron { transform: rotate(90deg); }
    .tree-regions {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.25s var(--ease-out);
    }
    .tree-continent.open .tree-regions { grid-template-rows: 1fr; }
    .tree-regions-inner {
      overflow: hidden;
      min-height: 0;
    }
    .tree-region {
      margin-left: 20px;
      border-left: 1px solid var(--border-subtle);
    }
    .tree-region-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      cursor: pointer;
      transition: background 0.1s ease;
    }
    .tree-region-header:hover { background: rgba(255,255,255,0.03); }
    .tree-region-header.active { background: rgba(255,255,255,0.05); }
    [data-theme="light"] .tree-region-header:hover { background: rgba(0,0,0,0.03); }
    [data-theme="light"] .tree-region-header.active { background: rgba(0,0,0,0.05); }
    .tree-region-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-teal);
      opacity: 0.4;
      flex-shrink: 0;
    }
    .tree-region-name {
      flex: 1;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .tree-countries {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.2s var(--ease-out);
    }
    .tree-region.open .tree-countries { grid-template-rows: 1fr; }
    .tree-countries-inner {
      overflow: hidden;
      min-height: 0;
      padding-left: 8px;
    }
    .tree-country {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 16px 5px 32px;
      cursor: pointer;
      transition: background 0.1s ease;
      flex-shrink: 0;
    }
    .tree-country:hover { background: rgba(255,255,255,0.04); }
    [data-theme="light"] .tree-country:hover { background: rgba(0,0,0,0.04); }
    .tree-country.active { background: rgba(20,184,166,0.1); }
    .tree-country-flag {
      font-size: 13px;
      flex-shrink: 0;
    }
    .tree-country-name {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .tree-country-name:hover { color: var(--text-primary); }
    .tree-country.active .tree-country-name { color: var(--accent-teal); }
    .tree-country-count {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-tertiary);
      margin-left: 4px;
    }
    .tree-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 8px 16px;
    }

    /* ===== CONTENT AREA ===== */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .hero-section {
      padding: 8px 0 24px;
    }
    .hero-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 400;
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .hero-title em {
      font-style: italic;
      color: var(--accent-teal);
    }
    .hero-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 600px;
    }
    .hero-stats {
      display: flex;
      gap: 24px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .hero-stat-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      background: linear-gradient(135deg, var(--accent-teal), var(--accent-official));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-stat-label {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    /* ===== FILTERS ===== */
    .filters-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-group {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 4px;
    }
    .filter-pill {
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .filter-pill:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    .filter-pill.active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    .filter-pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .filter-pill.active .dot { background: var(--accent-teal) !important; }

    /* ===== BREADCRUMB ===== */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-tertiary);
      flex-wrap: wrap;
    }
    .breadcrumb-item {
      cursor: pointer;
      transition: color 0.1s ease;
    }
    .breadcrumb-item:hover { color: var(--text-secondary); }
    .breadcrumb-sep { color: var(--text-tertiary); opacity: 0.5; }
    .breadcrumb-current { color: var(--accent-teal); }

    /* ===== CHANNEL GRID ===== */
    .channels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .channel-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeInUp 0.3s var(--ease-out) both;
    }
    .channel-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .channel-card[data-type="official"]::before { background: var(--accent-official); }
    .channel-card[data-type="b2b"]::before { background: var(--accent-b2b); }
    .channel-card[data-type="distribution"]::before { background: var(--accent-distribution); }
    .channel-card[data-type="crossborder"]::before { background: var(--accent-crossborder); }
    .channel-card:hover {
      border-color: var(--border-default);
      transform: translateY(-2px);
      box-shadow: var(--shadow-card);
    }
    .channel-card:hover::before { opacity: 1; }
    .channel-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .channel-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: var(--radius-xs);
      font-size: 11px;
      font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }
    .channel-badge.official { background: rgba(59,130,246,0.15); color: var(--accent-official-light); border: 1px solid rgba(59,130,246,0.2); }
    .channel-badge.b2b { background: rgba(16,185,129,0.15); color: var(--accent-b2b-light); border: 1px solid rgba(16,185,129,0.2); }
    .channel-badge.distribution { background: rgba(245,158,11,0.15); color: var(--accent-distribution-light); border: 1px solid rgba(245,158,11,0.2); }
    .channel-badge.crossborder { background: rgba(139,92,246,0.15); color: var(--accent-crossborder-light); border: 1px solid rgba(139,92,246,0.2); }
    .channel-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
    }
    .channel-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .channel-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .channel-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: var(--radius-xs);
      background: var(--bg-tertiary);
      color: var(--text-tertiary);
      border: 1px solid var(--border-subtle);
    }
    .channel-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 8px;
      border-top: 1px solid var(--border-subtle);
    }
    .channel-url {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-tertiary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }
    .channel-arrow {
      color: var(--text-tertiary);
      transition: transform 0.15s ease, color 0.15s ease;
    }
    .channel-card:hover .channel-arrow {
      transform: translateX(3px);
      color: var(--accent-teal);
    }

    /* ===== SECTION HEADER ===== */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .section-title {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      color: var(--text-primary);
    }
    .section-count {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-tertiary);
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border-subtle);
    }
    .section-divider {
      height: 1px;
      background: var(--border-subtle);
      margin-bottom: 16px;
    }

    /* ===== EMPTY & SEARCH STATES ===== */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-tertiary);
    }
    .empty-state-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      opacity: 0.3;
    }
    .empty-state-title {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .empty-state-desc {
      font-size: 14px;
      line-height: 1.6;
    }

    /* ===== DETAIL PANEL ===== */
    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .detail-overlay.open { opacity: 1; pointer-events: auto; }
    .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: min(520px, 100vw);
      height: 100vh;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-panel);
      z-index: 201;
      transform: translateX(100%);
      transition: transform 0.3s var(--ease-out);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .detail-panel.open { transform: translateX(0); }
    .detail-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .detail-header-info {
      flex: 1;
    }
    .detail-close {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: all 0.15s ease;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .detail-close:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .detail-title {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      color: var(--text-primary);
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .detail-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }
    .detail-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .detail-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .detail-meta-item {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 12px;
    }
    .detail-meta-label {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .detail-meta-value {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .detail-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      background: var(--bg-secondary);
    }
    .btn-primary {
      flex: 1;
      height: 44px;
      background: var(--accent-teal);
      color: #0b0f19;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s ease;
    }
    .btn-primary:hover {
      background: var(--accent-teal-light);
      transform: translateY(-1px);
    }
    .btn-ghost {
      height: 44px;
      padding: 0 16px;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.15s ease;
    }
    .btn-ghost:hover { border-color: var(--border-strong); color: var(--text-primary); }

    /* ===== FAVORITES PANEL ===== */
    .favorites-btn { position: relative; }
    .fav-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      background: var(--accent-distribution);
      color: #0b0f19;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-card) 50%, var(--bg-tertiary) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }

    /* ===== NOTIFICATION ===== */
    .notification {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow-card);
      z-index: 300;
      font-size: 13px;
      color: var(--text-primary);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s var(--ease-out);
    }
    .notification.show { transform: translateY(0); opacity: 1; }
    .notification-icon { color: var(--accent-teal); flex-shrink: 0; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      .channels-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    }
    @media (max-width: 768px) {
      :root { --sidebar-width: 280px; }
      .btn-sidebar-toggle { display: flex; }
      .sidebar {
        position: fixed;
        left: 0;
        top: var(--header-height);
        height: calc(100vh - var(--header-height));
        z-index: 50;
        box-shadow: 4px 0 24px rgba(0,0,0,0.3);
      }
      .sidebar.collapsed { transform: translateX(-100%); width: var(--sidebar-width); opacity: 1; }
      .content { padding: 16px; }
      .header { padding: 0 16px; }
      .hero-stats { gap: 16px; }
      .filters-bar { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
      .filter-group { flex-shrink: 0; }
      .channels-grid { grid-template-columns: 1fr; }
      .header-logo-text { display: none; }
      .header-logo-sub { display: none; }
      .detail-panel { width: 100vw; }
    }
    @media (max-width: 480px) {
      .header-search { display: none; }
    }

    /* ===== ZOOM TOOL ===== */
    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 4px;
    }
    .zoom-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 16px;
      transition: all 0.1s ease;
    }
    .zoom-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .zoom-level {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-tertiary);
      padding: 0 4px;
      min-width: 40px;
      text-align: center;
    }

    /* ===== CONTINENT COLOR ICONS ===== */
    .icon-asia { background: linear-gradient(135deg, #ef4444, #f97316); }
    .icon-europe { background: linear-gradient(135deg, #3b82f6, #6366f1); }
    .icon-africa { background: linear-gradient(135deg, #f59e0b, #eab308); }
    .icon-americas { background: linear-gradient(135deg, #10b981, #14b8a6); }
    .icon-oceania { background: linear-gradient(135deg, #06b6d4, #0ea5e9); }
    .icon-global { background: linear-gradient(135deg, #8b5cf6, #a855f7); }

    /* ===== PANEL SECTION ===== */
    .panel-section {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 16px;
    }

    /* ===== CONTINENT BANNER ===== */
    .continent-banner {
      background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-card));
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 32px;
      text-align: center;
      margin-bottom: 8px;
    }
    .continent-banner-emoji {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .continent-banner-title {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .continent-banner-sub {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* ===== COPY SUCCESS ===== */
    .copy-success {
      color: var(--accent-b2b) !important;
    }
  </style>
</head>
<body>
<div class="app" id="app">
  <!-- HEADER -->
  <header class="header">
    <button class="btn-icon btn-sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="header-logo">
      <svg viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" fill="none" stroke="var(--accent-teal)" stroke-width="1.5"/>
        <path d="M10 16 L16 10 L22 16 L16 22Z" fill="none" stroke="var(--accent-teal)" stroke-width="1.5"/>
        <circle cx="16" cy="16" r="2.5" fill="var(--accent-teal)"/>
        <path d="M16 3.5 L16 7 M16 25 L16 28.5 M3.5 16 L7 16 M25 16 L28.5 16" stroke="var(--accent-teal)" stroke-width="1" opacity="0.4"/>
      </svg>
      <div>
        <div class="header-logo-text">TradeRoot</div>
        <div class="header-logo-sub">全球贸易导航</div>
      </div>
    </div>
    <div class="header-search">
      <svg class="header-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="globalSearch" placeholder="搜索国家、平台、关键词..." autocomplete="off">
    </div>
    <div class="header-actions">
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="changeFontSize(-1)" title="缩小">A-</button>
        <span class="zoom-level" id="zoomLevel">100%</span>
        <button class="zoom-btn" onclick="changeFontSize(1)" title="放大">A+</button>
      </div>
      <button class="lang-toggle" onclick="toggleLang()" id="langToggle">EN / 中文</button>
      <button class="btn-icon" onclick="toggleTheme()" title="切换主题" id="themeToggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
      <button class="btn-icon favorites-btn" onclick="showFavorites()" title="收藏">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="fav-badge" id="favBadge" style="display:none">0</span>
      </button>
    </div>
  </header>

  <!-- MAIN WRAPPER -->
  <div class="main-wrapper">
    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title" data-i18n="navTitle">导航目录</div>
        <div class="sidebar-stats">
          <span class="stat-pill">144 <span data-i18n="countries">国家</span></span>
          <span class="stat-pill">900+ <span data-i18n="channels">渠道</span></span>

      <div class="sidebar-tree" id="sidebarTree">
        <!-- Tree rendered by JS -->
      </div>

    <!-- CONTENT -->
    <main class="content" id="content">
      <!-- Rendered by JS -->
    </main>
  </div>

  <!-- DETAIL OVERLAY -->
  <div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
  <aside class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div class="detail-header-info">
        <div class="detail-title" id="detailTitle"></div>
        <div id="detailBadge"></div>
      </div>
      <button class="detail-close" onclick="closeDetail()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

    <div class="detail-body" id="detailBody"></div>
    <div class="detail-footer">
      <button class="btn-ghost" onclick="toggleDetailFav()" id="detailFavBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span data-i18n="favAdd">收藏</span>
      </button>
      <button class="btn-primary" onclick="openChannel()" id="openChannelBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        <span data-i18n="visitSite">访问官网</span>
      </button>
    </div>
  </aside>

  <!-- NOTIFICATION -->
  <div class="notification" id="notification">
    <svg class="notification-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="notificationText"></span>
  </div>
</div>

<script type="module">
import TRADEDATA from './src/data/channels.js';

// ===== STATE =====
let state = {
  lang: 'zh',
  theme: 'dark',
  fontSize: 100,
  sidebarOpen: true,
  currentContinent: null,
  currentRegion: null,
  currentCountry: null,
  currentFilter: 'all',
  searchQuery: '',
  favorites: JSON.parse(localStorage.getItem('tr_root_favs') || '[]'),
  showingFavorites: false,
  currentChannel: null,
};

// ===== HELPERS =====
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);
const flagMap = {
  JP:'🇯🇵', KR:'🇰🇷', HK:'🇭🇰', TW:'🇹🇼', MN:'🇲🇳',
  SG:'🇸🇬', TH:'🇹🇭', VN:'🇻🇳', ID:'🇮🇩', PH:'🇵🇭', MY:'🇲🇾', KH:'🇰🇭', MM:'🇲🇲', LA:'🇱🇦', BN:'🇧🇳',
  IN:'🇮🇳', PK:'🇵🇰', BD:'🇧🇩', LK:'🇱🇰',
  AE:'🇦🇪', SA:'🇸🇦', TR:'🇹🇷', QA:'🇶🇦', KW:'🇰🇼', OM:'🇴🇲', BH:'🇧🇭', IR:'🇮🇷', IL:'🇮🇱', KZ:'🇰🇿', UZ:'🇺🇿',
  DE:'🇩🇪', FR:'🇫🇷', GB:'🇬🇧', NL:'🇳🇱', BE:'🇧🇪', CH:'🇨🇭', AT:'🇦🇹',
  IT:'🇮🇹', ES:'🇪🇸', PT:'🇵🇹', GR:'🇬🇷',
  PL:'🇵🇱', CZ:'🇨🇿', HU:'🇭🇺', RO:'🇷🇴', BG:'🇧🇬', LT:'🇱🇹', SE:'🇸🇪', DK:'🇩🇰', FI:'🇫🇮', NO:'🇳🇴',
  EG:'🇪🇬', DZ:'🇩🇿', MA:'🇲🇦', TN:'🇹🇳',
  KE:'🇰🇪', TZ:'🇹🇿', ET:'🇪🇹', UG:'🇺🇬', RW:'🇷🇼',
  NG:'🇳🇬', GH:'🇬🇭', CI:'🇨🇮', SN:'🇸🇳',
  ZA:'🇿🇦', ZM:'🇿🇲', AO:'🇦🇴', CD:'🇨🇩', CM:'🇨🇲',
  US:'🇺🇸', CA:'🇨🇦', MX:'🇲🇽', PA:'🇵🇦', CR:'🇨🇷', DO:'🇩🇴',
  BR:'🇧🇷', AR:'🇦🇷', CL:'🇨🇱', CO:'🇨🇴', PE:'🇵🇪',
  AU:'🇦🇺', NZ:'🇳🇿', PG:'🇵🇬', FJ:'🇫🇯',
};
const continentIcons = {
  asia: '🌏', europe: '🏰', africa: '🌍', americas: '🌎', oceania: '🏝️'
};
const continentNames = {
  asia: { zh: '亚洲', en: 'Asia' },
  europe: { zh: '欧洲', en: 'Europe' },
  africa: { zh: '非洲', en: 'Africa' },
  americas: { zh: '美洲', en: 'Americas' },
  oceania: { zh: '大洋洲', en: 'Oceania' },
};
const typeNames = {
  official: { zh: '官方', en: 'Official' },
  b2b: { zh: 'B2B平台', en: 'B2B Platform' },
  distribution: { zh: '代理分销', en: 'Distribution' },
  crossborder: { zh: '跨境平台', en: 'Cross-border' },
};
const typeColors = {
  official: { bg: 'rgba(59,130,246,0.15)', color: 'var(--accent-official-light)', border: 'rgba(59,130,246,0.2)' },
  b2b: { bg: 'rgba(16,185,129,0.15)', color: 'var(--accent-b2b-light)', border: 'rgba(16,185,129,0.2)' },
  distribution: { bg: 'rgba(245,158,11,0.15)', color: 'var(--accent-distribution-light)', border: 'rgba(245,158,11,0.2)' },
  crossborder: { bg: 'rgba(139,92,246,0.15)', color: 'var(--accent-crossborder-light)', border: 'rgba(139,92,246,0.2)' },
};

function l(key) { return state.lang === 'zh' ? key : key; }
function t(obj) { if (!obj) return ''; return obj[state.lang] || obj.zh || ''; }
function getFlag(flag) { return flagMap[flag] || '🌐'; }
function countChannels(country) {
  if (!country || !country.channels) return 0;
  return Object.values(country.channels).flat().length;
}
function countCountryChannels(continent) {
  let total = 0;
  for (const region of continent.regions || []) {
    for (const country of region.countries || []) {
      total += countChannels(country);
    }
  }
  total += (continent.crossborder || []).length;
  return total;
}
function countRegionChannels(region) {
  let total = 0;
  for (const country of region.countries || []) {
    total += countChannels(country);
  }
  return total;
}

// ===== THEME =====
window.toggleTheme = function() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', state.theme);
  localStorage.setItem('tr_theme', state.theme);
};
function initTheme() {
  const saved = localStorage.getItem('tr_theme');
  if (saved) { state.theme = saved; document.documentElement.setAttribute('data-theme', saved); }
}

// ===== LANG =====
window.toggleLang = function() {
  state.lang = state.lang === 'zh' ? 'en' : 'zh';
  renderAll();
  localStorage.setItem('tr_lang', state.lang);
  $('#langToggle').textContent = state.lang === 'zh' ? 'EN / 中文' : '中文 / EN';
}
function initLang() {
  const saved = localStorage.getItem('tr_lang');
  if (saved) {
    state.lang = saved;
    $('#langToggle').textContent = state.lang === 'zh' ? 'EN / 中文' : '中文 / EN';
  }
}

// ===== ZOOM =====
window.changeFontSize = function(dir) {
  const sizes = [80, 90, 100, 110, 120];
  const idx = sizes.indexOf(state.fontSize);
  const newIdx = Math.max(0, Math.min(sizes.length - 1, idx + dir));
  state.fontSize = sizes[newIdx];
  document.body.style.fontSize = state.fontSize + '%';
  $('#zoomLevel').textContent = state.fontSize + '%';
  localStorage.setItem('tr_zoom', state.fontSize);
}
function initZoom() {
  const saved = parseInt(localStorage.getItem('tr_zoom'));
  if (saved) {
    state.fontSize = saved;
    document.body.style.fontSize = saved + '%';
    $('#zoomLevel').textContent = saved + '%';
  }
}

// ===== SIDEBAR =====
window.toggleSidebar = function() {
  state.sidebarOpen = !state.sidebarOpen;
  $('#sidebar').classList.toggle('collapsed', !state.sidebarOpen);
}
function renderSidebar() {
  const tree = $('#sidebarTree');
  tree.innerHTML = TRADEDATA.continents.map(cont => {
    const isOpen = cont.id === state.currentContinent;
    const iconClass = `icon-${cont.id}`;
    const name = t(cont.name);
    const count = countCountryChannels(cont);
    return `
      <div class="tree-continent ${isOpen ? 'open' : ''}" data-id="${cont.id}">
        <div class="tree-continent-header ${isOpen ? 'open' : ''}" onclick="toggleContinent('${cont.id}')">
          <div class="tree-continent-icon ${iconClass}" style="display:flex;align-items:center;justify-content:center;">
            ${continentIcons[cont.id] || '🌐'}
          </div>
          <span class="tree-continent-name">${name}</span>
          <span class="tree-continent-count">${count}</span>
          <svg class="tree-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div class="tree-regions">
          <div class="tree-regions-inner">
          ${(cont.regions || []).map(region => {
            const regionOpen = region.id === state.currentRegion;
            const regionName = t(region.name);
            const regionCount = countRegionChannels(region);
            return `
              <div class="tree-region ${regionOpen ? 'open' : ''}" data-id="${region.id}">
                <div class="tree-region-header ${regionOpen ? 'open' : ''}" onclick="toggleRegion('${cont.id}','${region.id}')">
                  <div class="tree-region-dot"></div>
                  <span class="tree-region-name">${regionName}</span>
                  <span class="tree-continent-count">${regionCount}</span>
                  <svg class="tree-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
                <div class="tree-countries">
                  <div class="tree-countries-inner">
                  ${(region.countries || []).map(country => {
                    const isActive = state.currentCountry === country.id;
                    const flag = getFlag(country.flag);
                    const cCount = countChannels(country);
                    return `
                      <div class="tree-country ${isActive ? 'active' : ''}" onclick="selectCountry('${cont.id}','${region.id}','${country.id}')">
                        <span class="tree-country-flag">${flag}</span>
                        <span class="tree-country-name">${t(country.name)}</span>
                        <span class="tree-country-count">${cCount}</span>
                      </div>
                    `;
                  }).join('')}
                  </div>
                </div>
              </div>
            `;
          }).join('')}
          ${(cont.crossborder || []).length > 0 ? `
            <div class="tree-region ${state.currentRegion === 'crossborder' ? 'open' : ''}" data-id="crossborder">
              <div class="tree-region-header ${state.currentRegion === 'crossborder' ? 'open' : ''}" onclick="toggleRegion('${cont.id}','crossborder')">
                <div class="tree-region-dot" style="background:var(--accent-crossborder)"></div>
                <span class="tree-region-name">${state.lang === 'zh' ? '跨境通用平台' : 'Cross-border Platforms'}</span>
                <span class="tree-continent-count">${cont.crossborder.length}</span>
                <svg class="tree-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
              <div class="tree-countries">
                  <div class="tree-countries-inner">
                  ${cont.crossborder.map(ch => `
                    <div class="tree-country" onclick="selectChannelDirect('${cont.id}','crossborder',null,'${ch.name}')">
                      <span class="tree-country-flag">🌐</span>
                      <span class="tree-country-name">${ch.name}</span>
                    </div>
                  `).join('')}
                  </div>
                </div>
            </div>
          ` : ''}

        </div>

    `;
  }).join('');
}

window.toggleContinent = function(id) {
  if (state.currentContinent === id) {
    state.currentContinent = null;
    state.currentRegion = null;
    state.currentCountry = null;
  } else {
    state.currentContinent = id;
    state.currentRegion = null;
    state.currentCountry = null;
  }
  state.showingFavorites = false;
  renderSidebar();
  renderContent();
}
window.toggleRegion = function(contId, regionId) {
  if (state.currentContinent !== contId) {
    state.currentContinent = contId;
  }
  if (state.currentRegion === regionId) {
    state.currentRegion = null;
    state.currentCountry = null;
  } else {
    state.currentRegion = regionId;
    state.currentCountry = null;
  }
  state.showingFavorites = false;
  renderSidebar();
  renderContent();
}
window.selectCountry = function(contId, regionId, countryId) {
  state.currentContinent = contId;
  state.currentRegion = regionId;
  state.currentCountry = countryId;
  state.showingFavorites = false;
  renderSidebar();
  renderContent();
}
window.selectChannelDirect = function(contId, regionId, countryId, channelName) {
  state.currentContinent = contId;
  state.currentRegion = regionId;
  state.currentCountry = countryId;
  state.showingFavorites = false;
  renderSidebar();
  renderContent();
}

// ===== SEARCH =====
function initSearch() {
  $('#globalSearch').addEventListener('input', (e) => {
    state.searchQuery = e.target.value.trim();
    state.showingFavorites = false;
    renderContent();
  });
}

// ===== RENDER CONTENT =====
function renderContent() {
  const content = $('#content');
  let html = '';

  // Search mode
  if (state.searchQuery.length > 0) {
    html += renderSearchResults();
  } else if (state.showingFavorites) {
    html += renderFavorites();
  } else if (state.currentContinent) {
    html += renderContinent();
  } else {
    html += renderHome();
  }

  content.innerHTML = html;
}

function renderHome() {
  const title = state.lang === 'zh' ? '探索全球渠道' : 'Explore Global Channels';
  const subtitle = state.lang === 'zh'
    ? '从左侧目录选择一个大洲开始，层层展开，找到最适合您的海外采购、分销与代理渠道。'
    : 'Select a continent from the sidebar to begin exploring procurement, distribution, and agency channels worldwide.';
  return `
    <div class="hero-section">
      <h1 class="hero-title">${title}</h1>
      <p class="hero-subtitle">${subtitle}</p>
      <div class="hero-stats">
        <div class="hero-stat">
          <span class="hero-stat-number">6</span>
          <span class="hero-stat-label">${state.lang === 'zh' ? '大洲' : 'Continents'}</span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-number">144</span>
          <span class="hero-stat-label">${state.lang === 'zh' ? '国家/地区' : 'Countries'}</span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-number">900+</span>
          <span class="hero-stat-label">${state.lang === 'zh' ? '渠道平台' : 'Channels'}</span>
        </div>
      </div>
    </div>
    <div class="section-header">
      <h2 class="section-title">${state.lang === 'zh' ? '快速入口' : 'Quick Access'}</h2>
    </div>
    <div class="section-divider"></div>
    <div class="channels-grid">
      ${TRADEDATA.continents.map(cont => `
        <div class="channel-card" data-type="official" onclick="toggleContinent('${cont.id}')">
          <div class="channel-card-header">
            <div class="channel-badge official">
              <span class="dot" style="background:var(--accent-official)"></span>
              ${continentIcons[cont.id] || '🌐'}
            </div>
          </div>
          <div class="channel-name">${t(cont.name)}</div>
          <div class="channel-desc">${state.lang === 'zh' ? `覆盖${cont.regions?.length || 0}个区域，${countCountryChannels(cont)}个平台渠道` : `Covers ${cont.regions?.length || 0} regions with ${countCountryChannels(cont)} channel platforms`}</div>
          <div class="channel-footer">
            <span class="channel-url">${state.lang === 'zh' ? '点击开始探索 →' : 'Click to explore →'}</span>
            <span class="channel-arrow">→</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderContinent() {
  const cont = TRADEDATA.continents.find(c => c.id === state.currentContinent);
  if (!cont) return '';
  let html = '';
  const title = t(cont.name);
  const subtitle = state.lang === 'zh' ? `${cont.regions?.length || 0}个区域 · ${countCountryChannels(cont)}个渠道` : `${cont.regions?.length || 0} regions · ${countCountryChannels(cont)} channels`;

  // Continent banner
  html += `
    <div class="continent-banner">
      <div class="continent-banner-emoji">${continentIcons[cont.id] || '🌐'}</div>
      <div class="continent-banner-title">${title}</div>
      <div class="continent-banner-sub">${subtitle}</div>
    </div>
  `;

  // Breadcrumb
  html += `<div class="breadcrumb">`;
  html += `<span class="breadcrumb-item" onclick="state.currentContinent=null;renderSidebar();renderContent()">${state.lang==='zh'?'目录':'Directory'}</span>`;
  html += `<span class="breadcrumb-sep">›</span><span class="breadcrumb-current">${title}</span>`;
  html += `</div><div style="height:16px"></div>`;

  // Filter bar
  html += renderFilterBar();

  // Crossborder first if region is crossborder
  if (state.currentRegion === 'crossborder' && cont.crossborder) {
    html += renderSection(state.lang === 'zh' ? '跨境通用平台' : 'Cross-border Platforms', cont.crossborder.map(ch => ({...ch, _type: 'crossborder'})));
  }

  if (state.currentRegion && state.currentRegion !== 'crossborder') {
    const region = cont.regions.find(r => r.id === state.currentRegion);
    if (region) {
      if (state.currentCountry) {
        // Country view
        const country = region.countries.find(c => c.id === state.currentCountry);
        if (country) {
          html += `
            <div class="breadcrumb">
              <span class="breadcrumb-item" onclick="state.currentContinent=null;renderSidebar();renderContent()">${state.lang==='zh'?'目录':'Directory'}</span>
              <span class="breadcrumb-sep">›</span>
              <span class="breadcrumb-item" onclick="state.currentRegion=null;state.currentCountry=null;renderSidebar();renderContent()">${title}</span>
              <span class="breadcrumb-sep">›</span>
              <span class="breadcrumb-item" onclick="state.currentCountry=null;renderSidebar();renderContent()">${t(region.name)}</span>
              <span class="breadcrumb-sep">›</span>
              <span class="breadcrumb-current">${getFlag(country.flag)} ${t(country.name)}</span>
            </div>
            <div style="height:16px"></div>
          `;
          html += renderCountryChannels(country);
        }
      } else {
        // Region view - list countries
        html += `
          <div class="breadcrumb">
            <span class="breadcrumb-item" onclick="state.currentContinent=null;renderSidebar();renderContent()">${state.lang==='zh'?'目录':'Directory'}</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-item" onclick="state.currentRegion=null;state.currentCountry=null;renderSidebar();renderContent()">${title}</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current">${t(region.name)}</span>
          </div>
          <div style="height:16px"></div>
        `;
        html += renderRegionCountries(region, cont);
      }
    }
  } else if (!state.currentRegion) {
    // Continent overview - show all regions
    html += renderRegionList(cont);
  }

  return html;
}

function renderRegionList(cont) {
  return `
    <div class="section-header">
      <h2 class="section-title">${state.lang === 'zh' ? '按区域浏览' : 'Browse by Region'}</h2>
    </div>
    <div class="section-divider"></div>
    <div class="channels-grid">
      ${(cont.regions || []).map(region => `
        <div class="channel-card" data-type="official" onclick="toggleRegion('${cont.id}','${region.id}')">
          <div class="channel-card-header">
            <div class="channel-badge official">
              <span class="dot" style="background:var(--accent-teal)"></span>
              ${countRegionChannels(region)}
            </div>
          </div>
          <div class="channel-name">${t(region.name)}</div>
          <div class="channel-desc">${state.lang === 'zh' ? `${region.countries?.length || 0}个国家 · ${countRegionChannels(region)}个渠道` : `${region.countries?.length || 0} countries · ${countRegionChannels(region)} channels`}</div>
          <div class="channel-footer">
            <span class="channel-url">${state.lang === 'zh' ? '查看全部 →' : 'View all →'}</span>
            <span class="channel-arrow">→</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderRegionCountries(region, cont) {
  let html = `<div class="section-header"><h2 class="section-title">${t(region.name)}</h2></div><div class="section-divider"></div><div class="channels-grid">`;
  for (const country of region.countries || []) {
    const channels = Object.values(country.channels || {}).flat();
    const sampleChannel = channels[0] || {};
    html += `
      <div class="channel-card" data-type="official" onclick="selectCountry('${cont.id}','${region.id}','${country.id}')">
        <div class="channel-card-header">
          <div class="channel-badge official">
            <span class="dot" style="background:var(--accent-teal)"></span>
            ${getFlag(country.flag)}
          </div>
        </div>
        <div class="channel-name">${getFlag(country.flag)} ${t(country.name)}</div>
        <div class="channel-desc">${state.lang === 'zh' ? `${countChannels(country)}个渠道平台` : `${countChannels(country)} channel platforms`}</div>
        <div class="channel-footer">
          <span class="channel-url">${state.lang === 'zh' ? '查看详情 →' : 'View details →'}</span>
          <span class="channel-arrow">→</span>
        </div>
      </div>
    `;
  }
  html += `</div>`;
  return html;
}

function renderCountryChannels(country) {
  const chans = country.channels;
  let html = '';
  const typeOrder = ['official', 'b2b', 'distribution'];
  for (const type of typeOrder) {
    const items = chans[type] || [];
    if (items.length === 0) continue;
    if (state.currentFilter !== 'all' && state.currentFilter !== type) continue;
    html += renderSection(typeNames[type]?.[state.lang] || type, items.map(i => ({...i, _type: type})));
  }
  if (!html) {
    html = `<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><circle cx="32" cy="32" r="28"/><path d="M20 32h24M32 20v24" stroke-dasharray="4 4"/></svg></div><div class="empty-state-title">${state.lang === 'zh' ? '暂无此类型渠道' : 'No channels of this type'}</div></div>`;
  }
  return html;
}

function renderSection(title, channels) {
  const filtered = channels.filter(ch => {
    if (state.currentFilter !== 'all' && ch._type !== state.currentFilter) return false;
    return true;
  });
  if (filtered.length === 0) return '';
  return `
    <div style="margin-top:24px">
      <div class="section-header">
        <h2 class="section-title">${title}</h2>
        <span class="section-count">${filtered.length}</span>
      </div>
      <div class="section-divider"></div>
      <div class="channels-grid">
        ${filtered.map((ch, i) => renderChannelCard(ch, i)).join('')}
      </div>
    </div>
  `;
}

function renderFilterBar() {
  const filters = [
    { key: 'all', label: state.lang === 'zh' ? '全部' : 'All', dot: 'var(--text-tertiary)' },
    { key: 'official', label: state.lang === 'zh' ? '官方' : 'Official', dot: 'var(--accent-official)' },
    { key: 'b2b', label: state.lang === 'zh' ? 'B2B平台' : 'B2B', dot: 'var(--accent-b2b)' },
    { key: 'distribution', label: state.lang === 'zh' ? '代理分销' : 'Distribution', dot: 'var(--accent-distribution)' },
  ];
  return `
    <div class="filters-bar">
      <div class="filter-group">
        ${filters.map(f => `
          <button class="filter-pill ${state.currentFilter === f.key ? 'active' : ''}" onclick="setFilter('${f.key}')">
            <span class="dot" style="background:${f.dot}"></span>
            ${f.label}
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function renderChannelCard(channel, index) {
  const type = channel._type || 'official';
  const badgeClass = type;
  const badgeLabel = typeNames[type]?.[state.lang] || type;
  const desc = t(channel.desc);
  const isFav = state.favorites.some(f => f.name === channel.name && f.url === channel.url);
  return `
    <div class="channel-card" data-type="${type}" style="animation-delay:${index * 30}ms" onclick="openDetail(${JSON.stringify(channel).replace(/"/g, '&quot;')}, '${type}')">
      <div class="channel-card-header">
        <div class="channel-badge ${badgeClass}">
          <span class="dot" style="background:currentColor"></span>
          ${badgeLabel}
        </div>
        ${isFav ? '<span style="color:var(--accent-distribution)">★</span>' : ''}
      </div>
      <div class="channel-name">${channel.name}</div>
      <div class="channel-desc">${desc}</div>
      ${channel.tags ? `
        <div class="channel-tags">
          ${channel.tags.slice(0,3).map(tag => `<span class="channel-tag">${tag}</span>`).join('')}
        </div>
      ` : ''}
      <div class="channel-footer">
        <span class="channel-url">${channel.url.replace('https://','').replace('http://','')}</span>
        <span class="channel-arrow">→</span>
      </div>
    </div>
  `;
}

window.setFilter = function(key) {
  state.currentFilter = key;
  renderContent();
}

function renderSearchResults() {
  const q = state.searchQuery.toLowerCase();
  const results = [];
  for (const cont of TRADEDATA.continents) {
    for (const region of cont.regions || []) {
      for (const country of region.countries || []) {
        for (const [type, channels] of Object.entries(country.channels || {})) {
          for (const ch of channels) {
            if (matchChannel(ch, q)) {
              results.push({ ...ch, _type: type, _country: country, _region: region, _continent: cont });
            }
          }
        }
      }
    }
    // Crossborder
    for (const ch of cont.crossborder || []) {
      if (matchChannel(ch, q)) {
        results.push({ ...ch, _type: 'crossborder', _continent: cont });
      }
    }
  }
  if (results.length === 0) {
    return `
      <div class="hero-section">
        <h1 class="hero-title">${state.lang === 'zh' ? '搜索结果' : 'Search Results'}</h1>
        <p class="hero-subtitle">${state.lang === 'zh' ? `"${state.searchQuery}" 未找到相关渠道` : `No channels found for "${state.searchQuery}"`}</p>
      </div>
      <div class="empty-state">
        <div class="empty-state-icon"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><circle cx="28" cy="28" r="20"/><path d="M42 42l14 14"/></svg></div>
        <div class="empty-state-title">${state.lang === 'zh' ? '无结果' : 'No results'}</div>
        <div class="empty-state-desc">${state.lang === 'zh' ? '试试其他关键词' : 'Try a different search term'}</div>
      </div>
    `;
  }
  return `
    <div class="hero-section">
      <h1 class="hero-title">${state.lang === 'zh' ? '搜索结果' : 'Search Results'}</h1>
      <p class="hero-subtitle">${state.lang === 'zh' ? `为"${state.searchQuery}"找到 ${results.length} 个相关渠道` : `Found ${results.length} channels for "${state.searchQuery}"`}</p>
    </div>
    <div class="section-divider"></div>
    <div class="channels-grid">
      ${results.slice(0, 50).map((ch, i) => renderSearchCard(ch, i)).join('')}
    </div>
  `;
}
function matchChannel(ch, q) {
  return (ch.name || '').toLowerCase().includes(q) ||
    (t(ch.desc) || '').toLowerCase().includes(q) ||
    (ch.tags || []).some(tg => tg.toLowerCase().includes(q)) ||
    (ch.url || '').toLowerCase().includes(q);
}
function renderSearchCard(ch, index) {
  const type = ch._type;
  const badgeLabel = typeNames[type]?.[state.lang] || type;
  const breadcrumb = ch._country ? `${getFlag(ch._country.flag)} ${t(ch._country.name)}` : (ch._continent ? t(ch._continent.name) : '');
  return `
    <div class="channel-card" data-type="${type}" style="animation-delay:${index*30}ms" onclick="openDetail(${JSON.stringify(ch).replace(/"/g,'&quot;')},'${type}')">
      <div class="channel-card-header">
        <div class="channel-badge ${type}">
          <span class="dot" style="background:currentColor"></span>
          ${badgeLabel}
        </div>
      </div>
      <div class="channel-name">${ch.name}</div>
      <div class="channel-desc">${breadcrumb ? `<span style="color:var(--accent-teal);font-size:12px">${breadcrumb}</span><br>` : ''}${t(ch.desc)}</div>
      <div class="channel-footer">
        <span class="channel-url">${(ch.url||'').replace('https://','').replace('http://','')}</span>
        <span class="channel-arrow">→</span>
      </div>
    </div>
  `;
}

// ===== FAVORITES =====
function showFavorites() {
  state.showingFavorites = true;
  state.searchQuery = '';
  $('#globalSearch').value = '';
  renderContent();
}
function renderFavorites() {
  if (state.favorites.length === 0) {
    return `
      <div class="hero-section">
        <h1 class="hero-title">${state.lang === 'zh' ? '我的收藏' : 'My Favorites'}</h1>
        <p class="hero-subtitle">${state.lang === 'zh' ? '收藏感兴趣的渠道，方便随时查看' : 'Save channels you\'re interested in for easy access'}</p>
      </div>
      <div class="empty-state">
        <div class="empty-state-icon"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><path d="M32 56S8 40 8 24a12 12 0 0 1 24 0 12 12 0 0 1 24 0 12 12 0 0 1 24 0c0 16-24 32-24 32z"/></svg></div>
        <div class="empty-state-title">${state.lang === 'zh' ? '暂无收藏' : 'No favorites yet'}</div>
        <div class="empty-state-desc">${state.lang === 'zh' ? '点击渠道卡片上的收藏按钮添加' : 'Click the favorite button on any channel card to save it'}</div>
      </div>
    `;
  }
  return `
    <div class="hero-section">
      <h1 class="hero-title">${state.lang === 'zh' ? '我的收藏' : 'My Favorites'}</h1>
      <p class="hero-subtitle">${state.lang === 'zh' ? `${state.favorites.length} 个收藏渠道` : `${state.favorites.length} saved channels`}</p>
    </div>
    <div class="section-divider"></div>
    <div class="channels-grid">
      ${state.favorites.map((fav, i) => renderChannelCard({name: fav.name, url: fav.url, desc: fav.desc || {zh:'',en:''}, tags: fav.tags || [], _type: fav.type || 'official'}, i)).join('')}
    </div>

// ===== DETAIL PANEL =====
window.openDetail = function(channel, type) {
  state.currentChannel = { ...channel, _type: type };
  const panel = $('#detailPanel');
  const overlay = $('#detailOverlay');
  const title = $('#detailTitle');
  const badge = $('#detailBadge');
  const body = $('#detailBody');

  title.textContent = channel.name;
  const badgeLabel = typeNames[type]?.[state.lang] || type;
  const badgeStyle = typeColors[type] || typeColors.official;
  badge.innerHTML = `<div class="channel-badge" style="background:${badgeStyle.bg};color:${badgeStyle.color};border:1px solid ${badgeStyle.border}"><span class="dot" style="background:${badgeStyle.color}"></span>${badgeLabel}</div>`;

  const isFav = state.favorites.some(f => f.name === channel.name && f.url === channel.url);
  const favBtn = $('#detailFavBtn');
  favBtn.querySelector('span').textContent = isFav ? (state.lang === 'zh' ? '已收藏' : 'Saved') : (state.lang === 'zh' ? '收藏' : 'Save');

  const desc = t(channel.desc);
  const domain = channel.url.replace('https://','').replace('http://','').split('/')[0];

  body.innerHTML = `
    <div>
      <div class="detail-section-title">${state.lang === 'zh' ? '平台描述' : 'Platform Description'}</div>
      <div class="detail-desc">${desc || (state.lang === 'zh' ? '暂无描述' : 'No description available')}</div>
    </div>
    ${channel.tags && channel.tags.length > 0 ? `
    <div>
      <div class="detail-section-title">${state.lang === 'zh' ? '标签' : 'Tags'}</div>
      <div class="detail-tags">
        ${channel.tags.map(tag => `<span class="channel-tag">${tag}</span>`).join('')}
      </div>
    </div>
    ` : ''}
    <div>
      <div class="detail-section-title">${state.lang === 'zh' ? '信息' : 'Info'}</div>
      <div class="detail-meta">
        <div class="detail-meta-item">
          <div class="detail-meta-label">${state.lang === 'zh' ? '官方网站' : 'Website'}</div>
          <div class="detail-meta-value" style="font-family:JetBrains Mono,monospace;font-size:12px">${domain}</div>
        </div>
        <div class="detail-meta-item">
          <div class="detail-meta-label">${state.lang === 'zh' ? '渠道类型' : 'Channel Type'}</div>
          <div class="detail-meta-value">${badgeLabel}</div>
        </div>
      </div>
    </div>
  `;

  panel.classList.add('open');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
};

window.closeDetail = function() {
  $('#detailPanel').classList.remove('open');
  $('#detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
};

window.openChannel = function() {
  if (state.currentChannel && state.currentChannel.url) {
    window.open(state.currentChannel.url, '_blank', 'noopener,noreferrer');
    notify(state.lang === 'zh' ? '正在打开官网...' : 'Opening website...');
  }
};

window.toggleDetailFav = function() {
  if (!state.currentChannel) return;
  const ch = state.currentChannel;
  const isFav = state.favorites.some(f => f.name === ch.name && f.url === ch.url);
  if (isFav) {
    state.favorites = state.favorites.filter(f => f.name !== ch.name);
    notify(state.lang === 'zh' ? '已取消收藏' : 'Removed from favorites');
  } else {
    state.favorites.push({ name: ch.name, url: ch.url, desc: ch.desc, tags: ch.tags, type: ch._type });
    notify(state.lang === 'zh' ? '已添加到收藏' : 'Added to favorites');
  }
  localStorage.setItem('tr_root_favs', JSON.stringify(state.favorites));
  updateFavBadge();
  const favBtn = $('#detailFavBtn');
  favBtn.querySelector('span').textContent = !isFav ? (state.lang === 'zh' ? '已收藏' : 'Saved') : (state.lang === 'zh' ? '收藏' : 'Save');
  // Re-render current content to update star icons
  renderContent();
};

// ===== FAV BADGE =====
function updateFavBadge() {
  const badge = $('#favBadge');
  if (state.favorites.length > 0) {
    badge.style.display = 'flex';
    badge.textContent = state.favorites.length;
  } else {
    badge.style.display = 'none';
  }
}

// ===== NOTIFICATION =====
window.notify = function(msg) {
  const el = $('#notification');
  $('#notificationText').textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
};

// ===== EXPAND ALL =====
window.expandAll = function() {
  $$('.tree-continent, .tree-region').forEach(el => el.classList.add('open'));
};

// ===== RENDER ALL =====
function renderAll() {
  renderSidebar();
  renderContent();
  updateFavBadge();
}

// ===== INIT =====
initTheme();
initLang();
initZoom();
initSearch();
renderAll();
</script>
</body>
</html>
