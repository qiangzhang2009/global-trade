<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeRoot · 全球贸易导航</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%230b0f19' stroke='%2314b8a6' stroke-width='2'/%3E%3Cpath d='M10 16 L16 10 L22 16 L16 22Z' fill='none' stroke='%2314b8a6' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%2314b8a6'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- TradeRoot Analytics SDK — embedded via globaltrade tenant -->
  <script src="https://website-backend-admin.vercel.app/api/tracking-sdk?tenant=globaltrade" async></script>
  <style>
    /* ===== CSS RESET & ROOT ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #0b0f19;
      --bg-secondary: #111827;
      --bg-tertiary: #1a2235;
      --bg-card: #141c2e;
      --bg-input: #0f1623;
      --border-subtle: #1e2d45;
      --border-default: #243450;
      --border-strong: #2e4060;
      --text-primary: #f0ede8;
      --text-secondary: #9ca3b4;
      --text-tertiary: #5c6478;
      --accent-official: #3b82f6;
      --accent-official-light: #60a5fa;
      --accent-b2b: #10b981;
      --accent-b2b-light: #34d399;
      --accent-distribution: #f59e0b;
      --accent-distribution-light: #fbbf24;
      --accent-crossborder: #8b5cf6;
      --accent-crossborder-light: #a78bfa;
      --accent-teal: #14b8a6;
      --accent-teal-light: #2dd4bf;
      --shadow-card: 0 2px 12px rgba(0,0,0,0.4);
      --shadow-panel: -4px 0 24px rgba(0,0,0,0.5);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --sidebar-width: 280px;
      --header-height: 64px;
      --banner-height: 300px;
      --ease-out: cubic-bezier(0, 0, 0.2, 1);
      --ease-in: cubic-bezier(0.4, 0, 1, 1);
    }
    [data-theme="light"] {
      --bg-primary: #faf8f5;
      --bg-secondary: #f2ede6;
      --bg-tertiary: #e8e2d8;
      --bg-card: #ffffff;
      --bg-input: #f5f0e8;
      --border-subtle: #d4ccc0;
      --border-default: #c8bfb0;
      --border-strong: #b0a898;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6560;
      --text-tertiary: #9c9590;
      --shadow-card: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-panel: -4px 0 24px rgba(0,0,0,0.1);
      color-scheme: light;
    }
    :root { color-scheme: dark; }
    html { scroll-behavior: smooth; color-scheme: dark; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.3s ease, color 0.3s ease;
    }
    ::selection { background: var(--accent-teal); color: #0b0f19; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    a { color: inherit; text-decoration: none; }
    input { font-family: inherit; }

    /* ===== LAYOUT ===== */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .header {
      height: var(--header-height);
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-logo svg { width: 32px; height: 32px; }
    .header-logo-text {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    .header-logo-sub {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 300;
      letter-spacing: 0.5px;
      margin-top: -2px;
    }
    .header-search {
      flex: 1;
      max-width: 600px;
      position: relative;
    }
    .header-search input {
      width: 100%;
      height: 40px;
      background: var(--bg-input);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 0 16px 0 40px;
      font-size: 14px;
      color: var(--text-primary);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      outline: none;
    }
    .header-search input::placeholder { color: var(--text-tertiary); }
    .header-search input:focus {
      border-color: var(--accent-teal);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15);
    }
    .header-search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: background-color 0.15s ease, color 0.15s ease;
    }
    .btn-icon:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    .btn-icon.active {
      background: var(--accent-teal);
      color: #0b0f19;
    }
    .lang-toggle {
      height: 32px;
      padding: 0 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      border: 1px solid var(--border-default);
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    .lang-toggle:hover {
      border-color: var(--accent-teal);
      color: var(--accent-teal);
    }
    .btn-sidebar-toggle {
      display: none;
    }
    .bio-banner {
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
      overflow: hidden;
      height: var(--banner-height, 300px);
      cursor: default;
      flex-shrink: 0;
    }
    .bio-banner canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .bio-banner-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(11,15,25,0.95) 0%,
        rgba(11,15,25,0.75) 25%,
        rgba(11,15,25,0.4) 55%,
        rgba(11,15,25,0.1) 100%
      );
      pointer-events: none;
      z-index: 2;
    }
    .bio-banner-content {
      position: absolute;
      top: 50%;
      left: 32px;
      transform: translateY(-50%);
      z-index: 3;
      max-width: 260px;
      pointer-events: none;
      animation: bioReveal 1.4s cubic-bezier(0,0,0.2,1) 0.2s both;
    }
    @keyframes bioReveal {
      from { opacity: 0; transform: translateY(-50%) translateX(-24px); }
      to { opacity: 1; transform: translateY(-50%) translateX(0); }
    }
    .bio-banner-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent-teal-light);
      margin-bottom: 10px;
      opacity: 0.85;
    }
    .bio-banner-title {
      font-family: 'Instrument Serif', serif;
      font-size: 26px;
      line-height: 1.25;
      color: var(--text-primary);
      margin-bottom: 10px;
    }
    .bio-banner-title em {
      font-style: italic;
      color: var(--accent-teal-light);
    }
    .bio-banner-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.65;
    }
    .bio-legend {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      gap: 20px;
      pointer-events: none;
      animation: bioReveal 1.4s cubic-bezier(0,0,0.2,1) 1s both;
    }
    .bio-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }
    .bio-legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .bio-legend-dot.official { background: var(--accent-official); box-shadow: 0 0 8px var(--accent-official); }
    .bio-legend-dot.b2b { background: var(--accent-b2b); box-shadow: 0 0 8px var(--accent-b2b); }
    .bio-legend-dot.distribution { background: var(--accent-distribution); box-shadow: 0 0 8px var(--accent-distribution); }
    .bio-legend-dot.crossborder { background: var(--accent-crossborder); box-shadow: 0 0 8px var(--accent-crossborder); }
    [data-theme="light"] .bio-banner-overlay {
      background: linear-gradient(
        to right,
        rgba(250,248,245,0.96) 0%,
        rgba(250,248,245,0.8) 25%,
        rgba(250,248,245,0.5) 55%,
        rgba(250,248,245,0.1) 100%
      );
    }
    [data-theme="light"] .bio-banner { background: var(--bg-secondary); }
    .main-wrapper {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-subtle);
      overflow-y: auto;
      flex-shrink: 0;
      transition: width 0.25s var(--ease-out), opacity 0.2s ease;
    }
    .sidebar.collapsed {
      width: 0;
      opacity: 0;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 16px 16px 8px;
      position: sticky;
      top: 0;
      background: var(--bg-secondary);
      z-index: 10;
      border-bottom: 1px solid var(--border-subtle);
    }
    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }
    .sidebar-stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .stat-pill {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      padding: 3px 8px;
      border-radius: var(--radius-xs);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
    }
    .sidebar-tree {
      padding: 8px 0 24px;
    }
    .tree-continent {
      margin-bottom: 2px;
    }
    .tree-continent-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.1s ease;
      position: relative;
    }
    .tree-continent-header:hover { background: var(--bg-tertiary); }
    .tree-continent-header.active { background: var(--bg-tertiary); }
    .tree-continent-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .tree-continent-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .tree-continent-count {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-tertiary);
      background: var(--bg-primary);
      padding: 1px 6px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border-subtle);
    }
    .tree-chevron {
      color: var(--text-tertiary);
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }
    .tree-continent-header.open .tree-chevron { transform: rotate(90deg); }
    .tree-regions {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.25s var(--ease-out);
    }
    .tree-continent.open .tree-regions { grid-template-rows: 1fr; }
    .tree-regions-inner {
      overflow: hidden;
      min-height: 0;
    }
    .tree-region {
      margin-left: 20px;
      border-left: 1px solid var(--border-subtle);
    }
    .tree-region-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      cursor: pointer;
      transition: background 0.1s ease;
    }
    .tree-region-header:hover { background: rgba(255,255,255,0.03); }
    .tree-region-header.active { background: rgba(255,255,255,0.05); }
    [data-theme="light"] .tree-region-header:hover { background: rgba(0,0,0,0.03); }
    [data-theme="light"] .tree-region-header.active { background: rgba(0,0,0,0.05); }
    .tree-region-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-teal);
      opacity: 0.4;
      flex-shrink: 0;
    }
    .tree-region-name {
      flex: 1;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .tree-countries {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.2s var(--ease-out);
    }
    .tree-region.open .tree-countries { grid-template-rows: 1fr; }
    .tree-countries-inner {
      overflow: hidden;
      min-height: 0;
      padding-left: 8px;
    }
    .tree-country {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 16px 5px 32px;
      cursor: pointer;
      transition: background 0.1s ease;
      flex-shrink: 0;
    }
    .tree-country:hover { background: rgba(255,255,255,0.04); }
    [data-theme="light"] .tree-country:hover { background: rgba(0,0,0,0.04); }
    .tree-country.active { background: rgba(20,184,166,0.1); }
    .tree-country-flag {
      font-size: 13px;
      flex-shrink: 0;
    }
    .tree-country-name {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .tree-country-name:hover { color: var(--text-primary); }
    .tree-country.active .tree-country-name { color: var(--accent-teal); }
    .tree-country-count {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-tertiary);
      margin-left: 4px;
    }
    .tree-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 8px 16px;
    }

    /* ===== SIDEBAR FOOTER ===== */
    #sidebar {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebarTree {
      flex: 1;
      overflow-y: auto;
    }
    .sidebar-footer {
      flex-shrink: 0;
      border-top: 1px solid var(--border-subtle);
      padding: 12px 14px;
      background: var(--bg-secondary);
    }
    .sidebar-footer-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }
    .sidebar-footer-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px 8px;
      margin-bottom: 10px;
    }
    .sidebar-footer-link {
      font-size: 11px;
      color: var(--accent-teal);
      text-decoration: none;
      transition: color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-footer-link:hover { color: #5eead4; text-decoration: underline; }
    .sidebar-footer-contact {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .sidebar-footer-contact-label {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }
    .sidebar-footer-contact a {
      color: var(--accent-teal);
      text-decoration: none;
    }
    .sidebar-footer-contact a:hover { text-decoration: underline; }

    /* ===== CONTENT AREA ===== */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .hero-section {
      padding: 8px 0 24px;
    }
    .hero-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 400;
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .hero-title em {
      font-style: italic;
      color: var(--accent-teal);
    }
    .hero-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 600px;
    }
    .hero-stats {
      display: flex;
      gap: 24px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .hero-stat-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      background: linear-gradient(135deg, var(--accent-teal), var(--accent-official));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-stat-label {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    /* ===== FILTERS ===== */
    .filters-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-group {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 4px;
    }
    .filter-pill {
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .filter-pill:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    .filter-pill.active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    .filter-pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .filter-pill.active .dot { background: var(--accent-teal) !important; }

    /* ===== BREADCRUMB ===== */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-tertiary);
      flex-wrap: wrap;
    }
    .breadcrumb-item {
      cursor: pointer;
      transition: color 0.1s ease;
    }
    .breadcrumb-item:hover { color: var(--text-secondary); }
    .breadcrumb-sep { color: var(--text-tertiary); opacity: 0.5; }
    .breadcrumb-current { color: var(--accent-teal); }

    /* ===== CHANNEL GRID ===== */
    .channels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .channel-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 20px;
      cursor: pointer;
      transition: transform 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out), border-color 0.2s var(--ease-out);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeInUp 0.3s var(--ease-out) both;
    }
    .channel-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .channel-card[data-type="official"]::before { background: var(--accent-official); }
    .channel-card[data-type="b2b"]::before { background: var(--accent-b2b); }
    .channel-card[data-type="distribution"]::before { background: var(--accent-distribution); }
    .channel-card[data-type="crossborder"]::before { background: var(--accent-crossborder); }
    .channel-card:hover {
      border-color: var(--border-default);
      transform: translateY(-2px);
      box-shadow: var(--shadow-card);
    }
    .channel-card:hover::before { opacity: 1; }
    .channel-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .channel-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: var(--radius-xs);
      font-size: 11px;
      font-weight: 500;

      .channels-grid { grid-template-columns: 1fr; }
      .header-logo-text { display: none; }

    }
    @media (max-width: 480px) {

    .zoom-controls {

    /* ===== PANEL SECTION ===== */

    }

    /* ===== COPY SUCCESS ===== */

      color: var(--accent-b2b) !important;
    }
  </style>
</head>

function l(key) { return state.lang === 'zh' ? key : key; }
function t(obj) { if (!obj) return ''; return obj[state.lang] || obj.zh || ''; }
function getFlag(flag) { return flagMap[flag] || '🌐'; }
function countChannels(country) {
  if (!country || !country.channels) return 0;
  return Object.values(country.channels).flat().length;
}
function countCountryChannels(continent) {
  let total = 0;
  for (const region of continent.regions || []) {
    for (const country of region.countries || []) {
      total += countChannels(country);
    }
  }
  total += (continent.crossborder || []).length;
  return total;
}
function countRegionChannels(region) {
  let total = 0;
  for (const country of region.countries || []) {
    total += countChannels(country);
  }
  return total;
}

// ===== DYNAMIC GLOBAL STATS =====
function countStats() {
  if (typeof TRADEDATA === 'undefined') return { continents: 0, countries: 0, channels: 0 };
  let countries = 0;
  let channels = 0;
  for (const cont of TRADEDATA.continents) {
    countries += (cont.regions || []).reduce((a, r) => a + (r.countries || []).length, 0);
    for (const region of cont.regions || []) {
      for (const country of region.countries || []) {
        channels += countChannels(country);
      }
    }
    channels += (cont.crossborder || []).length;
  }
  return {
    continents: TRADEDATA.continents.length,
    countries,
    channels
  };
}
function updateStatsDisplay() {
  const s = countStats();
  const cnEl = document.querySelector('.stat-countries');
  const chEl = document.querySelector('.stat-channels');
  const hscEl = document.getElementById('hero-stat-countries');
  const hchEl = document.getElementById('hero-stat-channels');
  const hccEl = document.getElementById('hero-stat-continents');
  if (cnEl) cnEl.textContent = s.countries;
  if (chEl) chEl.textContent = s.channels >= 1000 ? (s.channels / 1000).toFixed(1) + 'k+' : s.channels + '+';
  if (hscEl) hscEl.textContent = s.countries;
  if (hchEl) hchEl.textContent = s.channels >= 1000 ? (s.channels / 1000).toFixed(1) + 'k+' : s.channels + '+';
  if (hccEl) hccEl.textContent = s.continents;
}

// ===== ZOOM =====
window.changeFontSize = function(dir) {
  const sizes = [80, 90, 100, 110, 120];
  const idx = sizes.indexOf(state.fontSize);
  const newIdx = Math.max(0, Math.min(sizes.length - 1, idx + dir));
  state.fontSize = sizes[newIdx];
  document.body.style.fontSize = state.fontSize + '%';
  $('#zoomLevel').textContent = state.fontSize + '%';
  localStorage.setItem('tr_zoom', state.fontSize);
}
function initZoom() {
  const saved = parseInt(localStorage.getItem('tr_zoom'));
  if (saved) {
    state.fontSize = saved;
    document.body.style.fontSize = saved + '%';
    $('#zoomLevel').textContent = saved + '%';
  }
}

    return `
      <div class="tree-continent ${isOpen ? 'open' : ''}" data-id="${cont.id}">
        <div class="tree-continent-header ${isOpen ? 'open' : ''}" onclick="toggleContinent('${cont.id}')">

            ${continentIcons[cont.id] || '🌐'}

          <span class="tree-continent-count">${count}</span>
          <svg class="tree-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div class="tree-regions">
          <div class="tree-regions-inner">
          ${(cont.regions || []).map(region => {
            const regionOpen = region.id === state.currentRegion;
            const regionName = t(region.name);

            return `
              <div class="tree-region ${regionOpen ? 'open' : ''}" data-id="${region.id}">
                <div class="tree-region-header ${regionOpen ? 'open' : ''}" onclick="toggleRegion('${cont.id}','${region.id}')">
                  <div class="tree-region-dot"></div>
                  <span class="tree-region-name">${regionName}</span>
                  <span class="tree-continent-count">${regionCount}</span>
                  <svg class="tree-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
                <div class="tree-countries">
                  <div class="tree-countries-inner">
                  ${(region.countries || []).map(country => {
                    const isActive = state.currentCountry === country.id;
                    const flag = getFlag(country.flag);
                    const cCount = countChannels(country);
                    return `
                      <div class="tree-country ${isActive ? 'active' : ''}" onclick="selectCountry('${cont.id}','${region.id}','${country.id}')">
                        <span class="tree-country-flag">${flag}</span>
                        <span class="tree-country-name">${t(country.name)}</span>
                        <span class="tree-country-count">${cCount}</span>
                      </div>
                    `;
                  }).join('')}
                  </div>
                </div>
              </div>
            `;
          }).join('')}
          ${(cont.crossborder || []).length > 0 ? `
            <div class="tree-region ${state.currentRegion === 'crossborder' ? 'open' : ''}" data-id="crossborder">
              <div class="tree-region-header ${state.currentRegion === 'crossborder' ? 'open' : ''}" onclick="toggleRegion('${cont.id}','crossborder')">
                <div class="tree-region-dot" style="background:var(--accent-crossborder)"></div>

            </div>
          ` : ''}

}

window.toggleContinent = function(id) {
  if (state.currentContinent === id) {
    state.currentContinent = null;
    state.currentRegion = null;
    state.currentCountry = null;
    track('navigate', { action: 'close_continent', continent: id });
  } else {
    state.currentContinent = id;
    state.currentRegion = null;
    state.currentCountry = null;
    track('navigate', { action: 'open_continent', continent: id });
  }
  state.showingFavorites = false;
  renderSidebar();
  renderContent();
}
window.toggleRegion = function(contId, regionId) {
  if (state.currentContinent !== contId) {
    state.currentContinent = contId;
  }
  if (state.currentRegion === regionId) {
    state.currentRegion = null;
    state.currentCountry = null;
    track('navigate', { action: 'close_region', continent: contId, region: regionId });
  } else {
    state.currentRegion = regionId;
    state.currentCountry = null;
    track('navigate', { action: 'open_region', continent: contId, region: regionId });
  }
  state.showingFavorites = false;
  renderSidebar();
  renderContent();
}
window.selectCountry = function(contId, regionId, countryId) {
  state.currentContinent = contId;
  state.currentRegion = regionId;
  state.currentCountry = countryId;
  state.showingFavorites = false;

}
window.selectChannelDirect = function(contId, regionId, countryId, channelName) {
  state.currentContinent = contId;

  state.currentCountry = countryId;

  renderContent();
}

// ===== SEARCH =====
function initSearch() {
  let lastQuery = '';
  $('#globalSearch').addEventListener('input', (e) => {
    state.searchQuery = e.target.value.trim();
    state.showingFavorites = false;
    if (state.searchQuery.length >= 3 && state.searchQuery !== lastQuery) {
      lastQuery = state.searchQuery;
      track('search', { query: state.searchQuery, query_length: state.searchQuery.length });
    }
    renderContent();
  });
}

// ===== RENDER CONTENT =====
function renderContent() {
  const content = $('#content');
  let html = '';

  // Search mode
  if (state.searchQuery.length > 0) {
    html += renderSearchResults();
  } else if (state.showingFavorites) {
    html += renderFavorites();
  } else if (state.currentContinent) {
    html += renderContinent();
  } else {
    html += renderHome();
  }

  content.innerHTML = html;
}

function renderHome() {
  const title = state.lang === 'zh' ? '探索全球渠道' : 'Explore Global Channels';
  const subtitle = state.lang === 'zh'
    ? '从左侧目录选择一个大洲开始，层层展开，找到最适合您的海外采购、分销与代理渠道。'
    : 'Select a continent from the sidebar to begin exploring procurement, distribution, and agency channels worldwide.';
  return `
    <div class="hero-section">
      <h1 class="hero-title">${title}</h1>
      <p class="hero-subtitle">${subtitle}</p>
      <div class="hero-stats">
        <div class="hero-stat">
          <span class="hero-stat-number" id="hero-stat-continents">${countStats().continents}</span>
          <span class="hero-stat-label">${state.lang === 'zh' ? '大洲' : 'Continents'}</span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-number" id="hero-stat-countries">${countStats().countries}</span>
          <span class="hero-stat-label">${state.lang === 'zh' ? '国家/地区' : 'Countries'}</span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-number" id="hero-stat-channels">${countStats().channels >= 1000 ? (countStats().channels/1000).toFixed(1)+'k+' : countStats().channels+'+'}</span>
          <span class="hero-stat-label">${state.lang === 'zh' ? '渠道平台' : 'Channels'}</span>
        </div>
      </div>
    </div>
    <div class="section-header">
      <h2 class="section-title">${state.lang === 'zh' ? '快速入口' : 'Quick Access'}</h2>
    </div>
    <div class="section-divider"></div>
    <div class="channels-grid">
      ${TRADEDATA.continents.map(cont => `
        <div class="channel-card" data-type="official" onclick="toggleContinent('${cont.id}')">
          <div class="channel-card-header">
            <div class="channel-badge official">
              <span class="dot" style="background:var(--accent-official)"></span>
              ${continentIcons[cont.id] || '🌐'}
            </div>
          </div>
          <div class="channel-name">${t(cont.name)}</div>
          <div class="channel-desc">${state.lang === 'zh' ? `覆盖${cont.regions?.length || 0}个区域，${countCountryChannels(cont)}个平台渠道` : `Covers ${cont.regions?.length || 0} regions with ${countCountryChannels(cont)} channel platforms`}</div>
          <div class="channel-footer">
            <span class="channel-url">${state.lang === 'zh' ? '点击开始探索 →' : 'Click to explore →'}</span>
            <span class="channel-arrow">→</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderContinent() {
  const cont = TRADEDATA.continents.find(c => c.id === state.currentContinent);
  if (!cont) return '';
  let html = '';
  const title = t(cont.name);
  const subtitle = state.lang === 'zh' ? `${cont.regions?.length || 0}个区域 · ${countCountryChannels(cont)}个渠道` : `${cont.regions?.length || 0} regions · ${countCountryChannels(cont)} channels`;

  // Continent banner
  html += `
    <div class="continent-banner">
      <div class="continent-banner-emoji">${continentIcons[cont.id] || '🌐'}</div>
      <div class="continent-banner-title">${title}</div>
      <div class="continent-banner-sub">${subtitle}</div>
    </div>
  `;

  // Breadcrumb
  html += `<div class="breadcrumb">`;
  html += `<span class="breadcrumb-item" onclick="state.currentContinent=null;renderSidebar();renderContent()">${state.lang==='zh'?'目录':'Directory'}</span>`;
  html += `<span class="breadcrumb-sep">›</span><span class="breadcrumb-current">${title}</span>`;
  html += `</div><div style="height:16px"></div>`;

  // Filter bar
  html += renderFilterBar();

  // Crossborder first if region is crossborder
  if (state.currentRegion === 'crossborder' && cont.crossborder) {
    html += renderSection(state.lang === 'zh' ? '跨境通用平台' : 'Cross-border Platforms', cont.crossborder.map(ch => ({...ch, _type: 'crossborder'})));
  }

  if (state.currentRegion && state.currentRegion !== 'crossborder') {
    const region = cont.regions.find(r => r.id === state.currentRegion);
    if (region) {
      if (state.currentCountry) {
        // Country view
        const country = region.countries.find(c => c.id === state.currentCountry);
        if (country) {
          html += `
            <div class="breadcrumb">
              <span class="breadcrumb-item" onclick="state.currentContinent=null;renderSidebar();renderContent()">${state.lang==='zh'?'目录':'Directory'}</span>
              <span class="breadcrumb-sep">›</span>
              <span class="breadcrumb-item" onclick="state.currentRegion=null;state.currentCountry=null;renderSidebar();renderContent()">${title}</span>
              <span class="breadcrumb-sep">›</span>
              <span class="breadcrumb-item" onclick="state.currentCountry=null;renderSidebar();renderContent()">${t(region.name)}</span>
              <span class="breadcrumb-sep">›</span>
              <span class="breadcrumb-current">${getFlag(country.flag)} ${t(country.name)}</span>
            </div>
            <div style="height:16px"></div>
          `;
          html += renderCountryChannels(country);
        }
      } else {
        // Region view - list countries
        html += `
          <div class="breadcrumb">
            <span class="breadcrumb-item" onclick="state.currentContinent=null;renderSidebar();renderContent()">${state.lang==='zh'?'目录':'Directory'}</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-item" onclick="state.currentRegion=null;state.currentCountry=null;renderSidebar();renderContent()">${title}</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current">${t(region.name)}</span>
          </div>
          <div style="height:16px"></div>
        `;
        html += renderRegionCountries(region, cont);
      }
    }
  } else if (!state.currentRegion) {
    // Continent overview - show all regions
    html += renderRegionList(cont);
  }

  return html;
}

function renderRegionList(cont) {
  return `
    <div class="section-header">
      <h2 class="section-title">${state.lang === 'zh' ? '按区域浏览' : 'Browse by Region'}</h2>
    </div>
    <div class="section-divider"></div>
    <div class="channels-grid">
      ${(cont.regions || []).map(region => `
        <div class="channel-card" data-type="official" onclick="toggleRegion('${cont.id}','${region.id}')">
          <div class="channel-card-header">
            <div class="channel-badge official">
              <span class="dot" style="background:var(--accent-teal)"></span>
              ${countRegionChannels(region)}
            </div>
          </div>
          <div class="channel-name">${t(region.name)}</div>
          <div class="channel-desc">${state.lang === 'zh' ? `${region.countries?.length || 0}个国家 · ${countRegionChannels(region)}个渠道` : `${region.countries?.length || 0} countries · ${countRegionChannels(region)} channels`}</div>
          <div class="channel-footer">
            <span class="channel-url">${state.lang === 'zh' ? '查看全部 →' : 'View all →'}</span>
            <span class="channel-arrow">→</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderRegionCountries(region, cont) {
  let html = `<div class="section-header"><h2 class="section-title">${t(region.name)}</h2></div><div class="section-divider"></div><div class="channels-grid">`;
  for (const country of region.countries || []) {
    const channels = Object.values(country.channels || {}).flat();
    const sampleChannel = channels[0] || {};
    html += `
      <div class="channel-card" data-type="official" onclick="selectCountry('${cont.id}','${region.id}','${country.id}')">
        <div class="channel-card-header">
          <div class="channel-badge official">
            <span class="dot" style="background:var(--accent-teal)"></span>
            ${getFlag(country.flag)}
          </div>
        </div>
        <div class="channel-name">${getFlag(country.flag)} ${t(country.name)}</div>
        <div class="channel-desc">${state.lang === 'zh' ? `${countChannels(country)}个渠道平台` : `${countChannels(country)} channel platforms`}</div>
        <div class="channel-footer">
          <span class="channel-url">${state.lang === 'zh' ? '查看详情 →' : 'View details →'}</span>
          <span class="channel-arrow">→</span>
        </div>
      </div>
    `;
  }
  html += `</div>`;
  return html;
}

function renderCountryChannels(country) {
  const chans = country.channels;
  let html = '';
  const typeOrder = ['official', 'b2b', 'distribution'];
  for (const type of typeOrder) {
    const items = chans[type] || [];
    if (items.length === 0) continue;
    if (state.currentFilter !== 'all' && state.currentFilter !== type) continue;
    html += renderSection(typeNames[type]?.[state.lang] || type, items.map(i => ({...i, _type: type})));
  }
  if (!html) {
    html = `<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><circle cx="32" cy="32" r="28"/><path d="M20 32h24M32 20v24" stroke-dasharray="4 4"/></svg></div><div class="empty-state-title">${state.lang === 'zh' ? '暂无此类型渠道' : 'No channels of this type'}</div></div>`;
  }
  return html;
}

function renderSection(title, channels) {
  const filtered = channels.filter(ch => {
    if (state.currentFilter !== 'all' && ch._type !== state.currentFilter) return false;
    return true;
  });
  if (filtered.length === 0) return '';
  return `
    <div style="margin-top:24px">
      <div class="section-header">
        <h2 class="section-title">${title}</h2>
        <span class="section-count">${filtered.length}</span>
      </div>
      <div class="section-divider"></div>
      <div class="channels-grid">
        ${filtered.map((ch, i) => renderChannelCard(ch, i)).join('')}
      </div>
    </div>
  `;
}

function renderFilterBar() {
  const filters = [
    { key: 'all', label: state.lang === 'zh' ? '全部' : 'All', dot: 'var(--text-tertiary)' },
    { key: 'official', label: state.lang === 'zh' ? '官方' : 'Official', dot: 'var(--accent-official)' },
    { key: 'b2b', label: state.lang === 'zh' ? 'B2B平台' : 'B2B', dot: 'var(--accent-b2b)' },
    { key: 'distribution', label: state.lang === 'zh' ? '代理分销' : 'Distribution', dot: 'var(--accent-distribution)' },
  ];
  return `
    <div class="filters-bar">
      <div class="filter-group">
        ${filters.map(f => `
          <button class="filter-pill ${state.currentFilter === f.key ? 'active' : ''}" onclick="setFilter('${f.key}')">
            <span class="dot" style="background:${f.dot}"></span>
            ${f.label}
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function renderChannelCard(channel, index) {
  const type = channel._type || 'official';
  const badgeClass = type;
  const badgeLabel = typeNames[type]?.[state.lang] || type;
  const desc = t(channel.desc);
  const isFav = state.favorites.some(f => f.name === channel.name && f.url === channel.url);
  return `
    <div class="channel-card" data-type="${type}" style="animation-delay:${index * 30}ms" onclick="openDetail(${JSON.stringify(channel).replace(/"/g, '&quot;')}, '${type}')">
      <div class="channel-card-header">
        <div class="channel-badge ${badgeClass}">
          <span class="dot" style="background:currentColor"></span>
          ${badgeLabel}
        </div>
        ${isFav ? '<span style="color:var(--accent-distribution)">★</span>' : ''}
      </div>
      <div class="channel-name">${channel.name}</div>
      <div class="channel-desc">${desc}</div>
      ${channel.tags ? `
        <div class="channel-tags">
          ${channel.tags.slice(0,3).map(tag => `<span class="channel-tag">${tag}</span>`).join('')}
        </div>
      ` : ''}
      <div class="channel-footer">
        <span class="channel-url">${channel.url.replace('https://','').replace('http://','')}</span>
        <span class="channel-arrow">→</span>
      </div>
    </div>
  `;
}

window.setFilter = function(key) {
  state.currentFilter = key;
  track('filter', { filter_type: key });
  renderContent();
}

function renderSearchResults() {
  const q = state.searchQuery.toLowerCase();
  const results = [];
  for (const cont of TRADEDATA.continents) {
    for (const region of cont.regions || []) {
      for (const country of region.countries || []) {
        for (const [type, channels] of Object.entries(country.channels || {})) {
          for (const ch of channels) {
            if (matchChannel(ch, q)) {
              results.push({ ...ch, _type: type, _country: country, _region: region, _continent: cont });
            }
          }
        }
      }
    }
    // Crossborder
    for (const ch of cont.crossborder || []) {
      if (matchChannel(ch, q)) {
        results.push({ ...ch, _type: 'crossborder', _continent: cont });
      }
    }
  }
  if (results.length === 0) {
    return `
      <div class="hero-section">
        <h1 class="hero-title">${state.lang === 'zh' ? '搜索结果' : 'Search Results'}</h1>
        <p class="hero-subtitle">${state.lang === 'zh' ? `"${state.searchQuery}" 未找到相关渠道` : `No channels found for "${state.searchQuery}"`}</p>
      </div>
      <div class="empty-state">
        <div class="empty-state-icon"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><circle cx="28" cy="28" r="20"/><path d="M42 42l14 14"/></svg></div>
        <div class="empty-state-title">${state.lang === 'zh' ? '无结果' : 'No results'}</div>
        <div class="empty-state-desc">${state.lang === 'zh' ? '试试其他关键词' : 'Try a different search term'}</div>
      </div>
    `;
  }
  return `
    <div class="hero-section">
      <h1 class="hero-title">${state.lang === 'zh' ? '搜索结果' : 'Search Results'}</h1>
      <p class="hero-subtitle">${state.lang === 'zh' ? `为"${state.searchQuery}"找到 ${results.length} 个相关渠道` : `Found ${results.length} channels for "${state.searchQuery}"`}</p>
    </div>
    <div class="section-divider"></div>
    <div class="channels-grid">
      ${results.slice(0, 50).map((ch, i) => renderSearchCard(ch, i)).join('')}
    </div>
  `;
}
function matchChannel(ch, q) {
  return (ch.name || '').toLowerCase().includes(q) ||
    (t(ch.desc) || '').toLowerCase().includes(q) ||
    (ch.tags || []).some(tg => tg.toLowerCase().includes(q)) ||
    (ch.url || '').toLowerCase().includes(q);
}
function renderSearchCard(ch, index) {
  const type = ch._type;
  const badgeLabel = typeNames[type]?.[state.lang] || type;
  const breadcrumb = ch._country ? `${getFlag(ch._country.flag)} ${t(ch._country.name)}` : (ch._continent ? t(ch._continent.name) : '');
  return `
    <div class="channel-card" data-type="${type}" style="animation-delay:${index*30}ms" onclick="openDetail(${JSON.stringify(ch).replace(/"/g,'&quot;')},'${type}')">
      <div class="channel-card-header">
        <div class="channel-badge ${type}">
          <span class="dot" style="background:currentColor"></span>
          ${badgeLabel}
        </div>
      </div>
      <div class="channel-name">${ch.name}</div>
      <div class="channel-desc">${breadcrumb ? `<span style="color:var(--accent-teal);font-size:12px">${breadcrumb}</span><br>` : ''}${t(ch.desc)}</div>
      <div class="channel-footer">
        <span class="channel-url">${(ch.url||'').replace('https://','').replace('http://','')}</span>
        <span class="channel-arrow">→</span>
      </div>
    </div>
  `;
}

// ===== FAVORITES =====
function showFavorites() {
  state.showingFavorites = true;
  state.searchQuery = '';
  $('#globalSearch').value = '';
  track('navigate', { action: 'view_favorites', count: state.favorites.length });
  renderContent();
}
function renderFavorites() {
  if (state.favorites.length === 0) {
    return `
      <div class="hero-section">
        <h1 class="hero-title">${state.lang === 'zh' ? '我的收藏' : 'My Favorites'}</h1>
        <p class="hero-subtitle">${state.lang === 'zh' ? '收藏感兴趣的渠道，方便随时查看' : 'Save channels you\'re interested in for easy access'}</p>
      </div>
      <div class="empty-state">
        <div class="empty-state-icon"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><path d="M32 56S8 40 8 24a12 12 0 0 1 24 0 12 12 0 0 1 24 0 12 12 0 0 1 24 0c0 16-24 32-24 32z"/></svg></div>
        <div class="empty-state-title">${state.lang === 'zh' ? '暂无收藏' : 'No favorites yet'}</div>
        <div class="empty-state-desc">${state.lang === 'zh' ? '点击渠道卡片上的收藏按钮添加' : 'Click the favorite button on any channel card to save it'}</div>
      </div>
    `;
  }
  return `
    <div class="hero-section">
      <h1 class="hero-title">${state.lang === 'zh' ? '我的收藏' : 'My Favorites'}</h1>
      <p class="hero-subtitle">${state.lang === 'zh' ? `${state.favorites.length} 个收藏渠道` : `${state.favorites.length} saved channels`}</p>
    </div>
    <div class="section-divider"></div>
    <div class="channels-grid">
      ${state.favorites.map((fav, i) => renderChannelCard({name: fav.name, url: fav.url, desc: fav.desc || {zh:'',en:''}, tags: fav.tags || [], _type: fav.type || 'official'}, i)).join('')}
    </div>
  `;
}

// ===== DETAIL PANEL =====
window.openDetail = function(channel, type) {
  state.currentChannel = { ...channel, _type: type };
  track('channel_view', {
    channel_name: channel.name,
    channel_type: type,
    channel_url: channel.url,
    channel_country: state.currentCountry || '',
    channel_region: state.currentRegion || '',
  });
  const panel = $('#detailPanel');
  const overlay = $('#detailOverlay');
  const title = $('#detailTitle');
  const badge = $('#detailBadge');
  const body = $('#detailBody');

  title.textContent = channel.name;
  const badgeLabel = typeNames[type]?.[state.lang] || type;
  const badgeStyle = typeColors[type] || typeColors.official;
  badge.innerHTML = `<div class="channel-badge" style="background:${badgeStyle.bg};color:${badgeStyle.color};border:1px solid ${badgeStyle.border}"><span class="dot" style="background:${badgeStyle.color}"></span>${badgeLabel}</div>`;

  const isFav = state.favorites.some(f => f.name === channel.name && f.url === channel.url);
  const favBtn = $('#detailFavBtn');
  favBtn.querySelector('span').textContent = isFav ? (state.lang === 'zh' ? '已收藏' : 'Saved') : (state.lang === 'zh' ? '收藏' : 'Save');

  const desc = t(channel.desc);
  const domain = channel.url.replace('https://','').replace('http://','').split('/')[0];

  body.innerHTML = `
    <div>
      <div class="detail-section-title">${state.lang === 'zh' ? '平台描述' : 'Platform Description'}</div>
      <div class="detail-desc">${desc || (state.lang === 'zh' ? '暂无描述' : 'No description available')}</div>
    </div>
    ${channel.tags && channel.tags.length > 0 ? `
    <div>
      <div class="detail-section-title">${state.lang === 'zh' ? '标签' : 'Tags'}</div>
      <div class="detail-tags">
        ${channel.tags.map(tag => `<span class="channel-tag">${tag}</span>`).join('')}
      </div>
    </div>
    ` : ''}
    <div>
      <div class="detail-section-title">${state.lang === 'zh' ? '信息' : 'Info'}</div>
      <div class="detail-meta">
        <div class="detail-meta-item">
          <div class="detail-meta-label">${state.lang === 'zh' ? '官方网站' : 'Website'}</div>
          <div class="detail-meta-value" style="font-family:JetBrains Mono,monospace;font-size:12px">${domain}</div>
        </div>
        <div class="detail-meta-item">
          <div class="detail-meta-label">${state.lang === 'zh' ? '渠道类型' : 'Channel Type'}</div>
          <div class="detail-meta-value">${badgeLabel}</div>
        </div>
      </div>
    </div>
  `;

  panel.classList.add('open');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
};

window.closeDetail = function() {
  $('#detailPanel').classList.remove('open');
  $('#detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
};

window.openChannel = function() {
  if (state.currentChannel && state.currentChannel.url) {
    track('channel_visit', {
      channel_name: state.currentChannel.name,
      channel_url: state.currentChannel.url,
      channel_type: state.currentChannel._type,
    });
    window.open(state.currentChannel.url, '_blank', 'noopener,noreferrer');
    notify(state.lang === 'zh' ? '正在打开官网...' : 'Opening website...');
  }
};

window.toggleDetailFav = function() {
  if (!state.currentChannel) return;
  const ch = state.currentChannel;
  const isFav = state.favorites.some(f => f.name === ch.name && f.url === ch.url);
  if (isFav) {
    state.favorites = state.favorites.filter(f => f.name !== ch.name);
    notify(state.lang === 'zh' ? '已取消收藏' : 'Removed from favorites');
    track('favorite', { action: 'remove', channel_name: ch.name, channel_url: ch.url, total_favorites: state.favorites.length });
  } else {
    state.favorites.push({ name: ch.name, url: ch.url, desc: ch.desc, tags: ch.tags, type: ch._type });
    notify(state.lang === 'zh' ? '已添加到收藏' : 'Added to favorites');
    track('favorite', { action: 'add', channel_name: ch.name, channel_url: ch.url, total_favorites: state.favorites.length });
  }
  localStorage.setItem('tr_root_favs', JSON.stringify(state.favorites));
  updateFavBadge();
  const favBtn = $('#detailFavBtn');
  favBtn.querySelector('span').textContent = !isFav ? (state.lang === 'zh' ? '已收藏' : 'Saved') : (state.lang === 'zh' ? '收藏' : 'Save');
  renderContent();
};

// ===== FAV BADGE =====
function updateFavBadge() {
  const badge = $('#favBadge');
  if (state.favorites.length > 0) {
    badge.style.display = 'flex';
    badge.textContent = state.favorites.length;
  } else {
    badge.style.display = 'none';
  }
}

// ===== NOTIFICATION =====
window.notify = function(msg) {
  const el = $('#notification');
  $('#notificationText').textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
};

// ===== EXPAND ALL =====
window.expandAll = function() {
  $$('.tree-continent, .tree-region').forEach(el => el.classList.add('open'));
};

// ===== RENDER ALL =====
function renderAll() {
  renderSidebar();
  renderContent();
  updateFavBadge();
  updateStatsDisplay();
}

// ===== BIO NEURAL WORLD MAP =====
function initBioCanvas() {
  const canvas = document.getElementById('bioCanvas');
  const banner = document.getElementById('bioBanner');
  if (!canvas || !banner) return;

  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, dpr = 1;
  let animId = null;
  let continents = [];
  let channels = [];
  let pulses = [];
  let ambientParticles = [];
  let hoverNode = null;
  let mouseX = 0, mouseY = 0;
  let theme = document.documentElement.getAttribute('data-theme') || 'dark';

  const CHANNEL_COLORS = {
    official: '#3b82f6',
    b2b: '#10b981',
    distribution: '#f59e0b',
    crossborder: '#8b5cf6'
  };
  const CHANNEL_GLOW = {
    official: 'rgba(59,130,246,',
    b2b: 'rgba(16,185,129,',
    distribution: 'rgba(245,158,11,',
    crossborder: 'rgba(139,92,246,'
  };

  // World-map layout: 6 continent hubs as fractions of W×H
  const BASE_CONTINENTS = [
    { id: 'asia',       label: '亚洲', labelEn: 'Asia',        cx: 0.74, cy: 0.38, r: 38,  color: '#f59e0b', glow: 'rgba(245,158,11,'  },
    { id: 'europe',     label: '欧洲', labelEn: 'Europe',       cx: 0.50, cy: 0.30, r: 32,  color: '#3b82f6', glow: 'rgba(59,130,246,'  },
    { id: 'north-america', label: '北美', labelEn: 'N. America', cx: 0.18, cy: 0.35, r: 30,  color: '#10b981', glow: 'rgba(16,185,129,'  },
    { id: 'south-america', label: '南美', labelEn: 'S. America', cx: 0.25, cy: 0.65, r: 22,  color: '#8b5cf6', glow: 'rgba(139,92,246,'  },
    { id: 'africa',     label: '非洲', labelEn: 'Africa',       cx: 0.50, cy: 0.58, r: 24,  color: '#14b8a6', glow: 'rgba(20,184,166,'  },
    { id: 'oceania',    label: '大洋洲', labelEn: 'Oceania',    cx: 0.82, cy: 0.68, r: 18,  color: '#f0ede8', glow: 'rgba(240,237,232,' }
  ];

  // Inter-continental connection pairs (synapses)
  const CONNECTIONS = [
    ['asia', 'europe'],
    ['asia', 'north-america'],
    ['asia', 'oceania'],
    ['europe', 'africa'],
    ['europe', 'north-america'],
    ['north-america', 'south-america'],
    ['africa', 'asia'],
    ['africa', 'south-america'],
    ['oceania', 'asia'],
  ];

  // Country micro-nodes per continent
  const COUNTRY_NODES = {
    'asia': [
      { name: '中国', nameEn: 'CN', cx: 0.70, cy: 0.44 },
      { name: '日本', nameEn: 'JP', cx: 0.77, cy: 0.33 },
      { name: '韩国', nameEn: 'KR', cx: 0.75, cy: 0.38 },
      { name: '印度', nameEn: 'IN', cx: 0.66, cy: 0.52 },
      { name: '东南亚', nameEn: 'SEA', cx: 0.72, cy: 0.62 },
      { name: '中东', nameEn: 'ME', cx: 0.60, cy: 0.45 },
      { name: '中亚', nameEn: 'CA', cx: 0.63, cy: 0.36 },
    ],
    'europe': [
      { name: '西欧', nameEn: 'W.EU', cx: 0.46, cy: 0.28 },
      { name: '北欧', nameEn: 'N.EU', cx: 0.48, cy: 0.18 },
      { name: '东欧', nameEn: 'E.EU', cx: 0.55, cy: 0.26 },
      { name: '南欧', nameEn: 'S.EU', cx: 0.48, cy: 0.36 },
    ],
    'north-america': [
      { name: '美国', nameEn: 'US', cx: 0.13, cy: 0.33 },
      { name: '加拿大', nameEn: 'CA', cx: 0.14, cy: 0.18 },
      { name: '墨西哥', nameEn: 'MX', cx: 0.10, cy: 0.52 },
    ],
    'south-america': [
      { name: '巴西', nameEn: 'BR', cx: 0.28, cy: 0.64 },
      { name: '南锥体', nameEn: 'S.AM', cx: 0.24, cy: 0.82 },
    ],
    'africa': [
      { name: '北非', nameEn: 'N.AF', cx: 0.46, cy: 0.44 },
      { name: '西非', nameEn: 'W.AF', cx: 0.40, cy: 0.58 },
      { name: '南非', nameEn: 'S.AF', cx: 0.50, cy: 0.78 },
      { name: '东非', nameEn: 'E.AF', cx: 0.56, cy: 0.62 },
    ],
    'oceania': [
      { name: '澳新', nameEn: 'AU/NZ', cx: 0.84, cy: 0.68 },
      { name: '太平洋', nameEn: 'PAC', cx: 0.90, cy: 0.60 },
    ]
  };

  // Channel data derived from TRADEDATA
  function buildChannels() {
    if (typeof TRADEDATA === 'undefined') return;
    const chs = [];
    const ctypes = ['official', 'b2b', 'distribution', 'crossborder'];
    TRADEDATA.continents.forEach(cont => {
      cont.regions.forEach(reg => {
        reg.countries.forEach(country => {
          ctypes.forEach(ct => {
            const list = country.channels[ct] || [];
            list.forEach(ch => {
              const node = BASE_CONTINENTS.find(n => n.id === cont.id) || BASE_CONTINENTS[0];
              const alpha = Math.random();
              chs.push({
                continentId: cont.id,
                countryId: country.id,
                countryName: country.name.zh,
                countryNameEn: country.name.en,
                type: ct,
                name: ch.name,
                url: ch.url,
                color: CHANNEL_COLORS[ct],
                glow: CHANNEL_GLOW[ct],
                x: node.cx + (Math.random() - 0.5) * node.r * 2.5,
                y: node.cy + (Math.random() - 0.5) * node.r * 2.5,
                phase: alpha * Math.PI * 2,
                freq: 0.3 + alpha * 0.5,
              });
            });
          });
        });
      });
    });
    // Limit for performance
    channels = chs.slice(0, 300);
  }

  function buildNodes() {
    continents = BASE_CONTINENTS.map(c => ({
      ...c,
      x: c.cx * W,
      y: c.cy * H,
      r: c.r * Math.min(W, H) / 600,
      pulsePhase: Math.random() * Math.PI * 2,
      pulseSpeed: 0.5 + Math.random() * 0.5,
    }));
    buildChannels();
  }

  function buildConnections() {
    const conns = [];
    CONNECTIONS.forEach(([a, b]) => {
      const na = continents.find(n => n.id === a);
      const nb = continents.find(n => n.id === b);
      if (!na || !nb) return;
      // Control point for bezier curve
      const mx = (na.x + nb.x) / 2 + (nb.y - na.y) * 0.15;
      const my = (na.y + nb.y) / 2 - (nb.x - na.x) * 0.15;
      const len = Math.hypot(nb.x - na.x, nb.y - na.y);
      conns.push({ x1: na.x, y1: na.y, mx, my, x2: nb.x, y2: nb.y, len });
    });
    return conns;
  }

  function buildCountryNodes() {
    const nodes = [];
    Object.entries(COUNTRY_NODES).forEach(([contId, list]) => {
      const cont = continents.find(n => n.id === contId);
      if (!cont) return;
      list.forEach((c, i) => {
        nodes.push({
          continentId: contId,
          name: c.name,
          nameEn: c.nameEn,
          x: c.cx * W,
          y: c.cy * H,
          r: 6 * Math.min(W, H) / 600,
          phase: i * 0.7 + Math.random(),
        });
      });
    });
    return nodes;
  }

  function spawnPulse(conns) {
    if (!conns.length) return;
    const c = conns[Math.floor(Math.random() * conns.length)];
    const types = Object.keys(CHANNEL_COLORS);
    const t = types[Math.floor(Math.random() * types.length)];
    const offset = Math.random();
    pulses.push({
      progress: offset,
      speed: 0.004 + Math.random() * 0.006,
      x1: c.x1, y1: c.y1, mx: c.mx, my: c.my, x2: c.x2, y2: c.y2,
      color: CHANNEL_COLORS[t],
      glow: CHANNEL_GLOW[t],
      type: t,
      alpha: 1,
      len: c.len,
    });
  }

  function spawnAmbientParticle() {
    const side = Math.floor(Math.random() * 4);
    let x, y, vx, vy;
    if (side === 0) { x = 0; y = Math.random() * H; vx = 0.3 + Math.random() * 0.5; vy = (Math.random() - 0.5) * 0.3; }
    else if (side === 1) { x = W; y = Math.random() * H; vx = -(0.3 + Math.random() * 0.5); vy = (Math.random() - 0.5) * 0.3; }
    else if (side === 2) { x = Math.random() * W; y = 0; vx = (Math.random() - 0.5) * 0.3; vy = 0.3 + Math.random() * 0.5; }
    else { x = Math.random() * W; y = H; vx = (Math.random() - 0.5) * 0.3; vy = -(0.3 + Math.random() * 0.5); }
    const types = Object.keys(CHANNEL_COLORS);
    const t = types[Math.floor(Math.random() * types.length)];
    ambientParticles.push({ x, y, vx, vy, alpha: 0, maxAlpha: 0.25 + Math.random() * 0.3,
      r: 1 + Math.random() * 1.5, color: CHANNEL_COLORS[t], glow: CHANNEL_GLOW[t], type: t, life: 0 });
  }

  function bezierPoint(t, x1, y1, mx, my, x2, y2) {
    const u = 1 - t;
    return {
      x: u*u*x1 + 2*u*t*mx + t*t*x2,
      y: u*u*y1 + 2*u*t*my + t*t*y2
    };
  }

  function drawGrid() {
    const gridSpacing = 80 * Math.min(W, H) / 600;
    ctx.save();
    ctx.strokeStyle = theme === 'dark' ? 'rgba(30,45,69,0.25)' : 'rgba(200,191,176,0.15)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x < W; x += gridSpacing) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += gridSpacing) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    ctx.restore();
  }

  function drawConnections(conns, t) {
    conns.forEach(c => {
      ctx.save();
      // Subtle glow path
      ctx.shadowColor = theme === 'dark' ? 'rgba(20,184,166,0.08)' : 'rgba(59,130,246,0.06)';
      ctx.shadowBlur = 8;
      ctx.strokeStyle = theme === 'dark' ? 'rgba(30,45,69,0.35)' : 'rgba(200,191,176,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(c.x1, c.y1);
      ctx.quadraticCurveTo(c.mx, c.my, c.x2, c.y2);
      ctx.stroke();
      ctx.restore();
    });
  }

  function drawCountryNodes(countryNodes, t) {
    countryNodes.forEach(n => {
      const pulse = 0.5 + 0.5 * Math.sin(t * 1.2 + n.phase);
      const r = n.r * (0.7 + 0.3 * pulse);
      const alpha = 0.25 + 0.25 * pulse;
      ctx.save();
      ctx.shadowColor = theme === 'dark' ? 'rgba(20,184,166,0.4)' : 'rgba(59,130,246,0.3)';
      ctx.shadowBlur = 6;
      ctx.fillStyle = theme === 'dark'
        ? `rgba(20,184,166,${alpha})`
        : `rgba(59,130,246,${alpha})`;
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawContinentNodes(t) {
    continents.forEach(n => {
      const pulse = 0.5 + 0.5 * Math.sin(t * n.pulseSpeed + n.pulsePhase);
      const glowR = n.r * (1.5 + 0.8 * pulse);

      ctx.save();
      // Outer glow rings
      for (let i = 3; i >= 1; i--) {
        const ringAlpha = (0.06 + 0.04 * pulse) / i;
        const ringR = n.r * (1 + i * 0.5);
        ctx.beginPath();
        ctx.arc(n.x, n.y, ringR, 0, Math.PI * 2);
        ctx.fillStyle = theme === 'dark'
          ? `rgba(20,184,166,${ringAlpha})`
          : `rgba(59,130,246,${ringAlpha * 0.5})`;
        ctx.fill();
      }

      // Core glow
      ctx.shadowColor = n.glow + '0.8)';
      ctx.shadowBlur = 20 + 15 * pulse;
      const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      grad.addColorStop(0, theme === 'dark' ? '#ffffff' : '#ffffff');
      grad.addColorStop(0.3, n.color);
      grad.addColorStop(1, n.glow + '0)');
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Inner ring
      ctx.shadowBlur = 0;
      ctx.strokeStyle = theme === 'dark'
        ? `rgba(255,255,255,${0.2 + 0.15 * pulse})`
        : `rgba(255,255,255,${0.4 + 0.2 * pulse})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r * 0.65, 0, Math.PI * 2);
      ctx.stroke();

      // Label
      ctx.font = `${Math.max(10, n.r * 0.45)}px 'DM Sans', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = theme === 'dark'
        ? `rgba(240,237,232,${0.75 + 0.25 * pulse})`
        : `rgba(26,26,26,${0.6 + 0.2 * pulse})`;
      ctx.fillText(n.label, n.x, n.y);
      ctx.restore();
    });
  }

  function drawChannels(t) {
    if (!channels.length) return;
    channels.forEach((ch, i) => {
      const pulse = Math.sin(t * ch.freq + ch.phase);
      if (pulse < 0.1) return;
      const alpha = Math.max(0, pulse - 0.1) * 0.7;
      ctx.save();
      ctx.shadowColor = ch.glow + '0.6)';
      ctx.shadowBlur = 4;
      ctx.fillStyle = ch.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
      ctx.beginPath();
      ctx.arc(ch.x * W, ch.y * H, 1.5 + pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawPulses(conns, t) {
    pulses = pulses.filter(p => p.progress < 1.0);
    pulses.forEach(p => {
      p.progress += p.speed;
      if (p.progress > 1) { p.progress = 1; return; }
      const pt = bezierPoint(p.progress, p.x1, p.y1, p.mx, p.my, p.x2, p.y2);
      const fadeIn = Math.min(1, p.progress * 8);
      const fadeOut = Math.min(1, (1 - p.progress) * 8);
      const alpha = Math.min(fadeIn, fadeOut) * 0.9;

      ctx.save();
      // Trail
      for (let i = 3; i >= 1; i--) {
        const tp = Math.max(0, p.progress - i * 0.04);
        const pt2 = bezierPoint(tp, p.x1, p.y1, p.mx, p.my, p.x2, p.y2);
        const trailAlpha = alpha * (1 - i / 4) * 0.5;
        ctx.beginPath();
        ctx.arc(pt2.x, pt2.y, 3 - i * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = p.glow + trailAlpha + ')';
        ctx.fill();
      }
      // Main pulse
      ctx.shadowColor = p.glow + '1)';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      // Inner bright core
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.restore();
    });
  }

  function drawAmbientParticles() {
    ambientParticles = ambientParticles.filter(p => p.life < 1);
    ambientParticles.forEach(p => {
      p.life += 0.003;
      p.x += p.vx;
      p.y += p.vy;
      const fadeIn = Math.min(1, p.life * 10);
      const fadeOut = Math.min(1, (1 - p.life) * 8);
      const alpha = p.maxAlpha * Math.min(fadeIn, fadeOut);
      ctx.save();
      ctx.shadowColor = p.glow + '0.5)';
      ctx.shadowBlur = 4;
      ctx.fillStyle = p.glow + alpha + ')';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawHoverTooltip() {
    if (!hoverNode) return;
    const { x, y, r, label, labelEn } = hoverNode;
    ctx.save();
    ctx.shadowColor = 'rgba(20,184,166,0.5)';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(x, y, r * 1.8, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(20,184,166,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    ctx.save();
    const fontSize = Math.max(11, r * 0.5);
    ctx.font = `${fontSize}px 'DM Sans', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = '#f0ede8';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 8;
    ctx.fillText(label, x, y - r - 6);
    ctx.font = `${fontSize * 0.75}px 'JetBrains Mono', monospace`;
    ctx.fillStyle = 'rgba(20,184,166,0.9)';
    ctx.fillText(labelEn, x, y - r - 6 - fontSize * 0.9);
    ctx.restore();
  }

  let conns = [], countryNodes = [];
  let pulseTimer = 0;
  let particleTimer = 0;

  function draw(t) {
    ctx.clearRect(0, 0, W, H);

    // Background gradient
    const bgGrad = ctx.createLinearGradient(0, 0, W, H);
    if (theme === 'dark') {
      bgGrad.addColorStop(0, '#0b0f19');
      bgGrad.addColorStop(0.5, '#0d1220');
      bgGrad.addColorStop(1, '#0b0f19');
    } else {
      bgGrad.addColorStop(0, '#faf8f5');
      bgGrad.addColorStop(0.5, '#f5f0e8');
      bgGrad.addColorStop(1, '#faf8f5');
    }
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    drawGrid();
    drawConnections(conns, t);
    drawCountryNodes(countryNodes, t);
    drawChannels(t);
    drawAmbientParticles();
    drawPulses(conns, t);
    drawContinentNodes(t);
    drawHoverTooltip();

    // Spawn pulses
    pulseTimer++;
    if (pulseTimer > 12) { pulseTimer = 0; spawnPulse(conns); }
    particleTimer++;
    if (particleTimer > 3) { particleTimer = 0; if (ambientParticles.length < 60) spawnAmbientParticle(); }
  }

  function loop(ts) {
    const t = ts * 0.001;
    draw(t);
    animId = requestAnimationFrame(loop);
  }

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = banner.clientWidth;
    H = banner.clientHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);
    buildNodes();
    conns = buildConnections();
    countryNodes = buildCountryNodes();
  }

  // Mouse interaction
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
    hoverNode = null;
    continents.forEach(n => {
      if (Math.hypot(mouseX - n.x, mouseY - n.y) < n.r * 2) {
        hoverNode = n;
        canvas.style.cursor = 'pointer';
      }
    });
    if (!hoverNode) canvas.style.cursor = 'default';
  });

  canvas.addEventListener('mouseleave', () => { hoverNode = null; });

  canvas.addEventListener('click', e => {
    if (!hoverNode) return;
    // Navigate to continent in sidebar
    const treeItem = document.querySelector(`[data-tree-id="${hoverNode.id}"]`);
    if (treeItem) {
      treeItem.click();
      document.querySelector('.sidebar')?.scrollIntoView({ behavior: 'smooth' });
    }
  });

  // Theme change listener
  const themeObserver = new MutationObserver(() => {
    theme = document.documentElement.getAttribute('data-theme') || 'dark';
  });
  themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

  resize();
  window.addEventListener('resize', resize, { passive: true });
  animId = requestAnimationFrame(loop);
}

// ===== INIT =====
initTheme();
initLang();
initZoom();
initSearch();
renderAll();
initBioCanvas();
</script>
